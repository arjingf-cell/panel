            };

            const saveDashboardAnnouncement = async () => {
                const title = dashboardAnnouncement.title.trim();
                const message = dashboardAnnouncement.message.trim();

                if (!title || !message) {
                    alert('Duyuru başlığı ve metni gerekli.');
                    return;
                }

                setAnnouncementSaving(true);
                const { error } = await supabaseClient
                    .from('announcements')
                    .insert([{
                        title,
                        message,
                        created_by: currentAdmin?.email || 'Admin',
                        is_active: true
                    }]);

                setAnnouncementSaving(false);
                if (error) {
                    alert('Duyuru kaydedilemedi: ' + error.message);
                    return;
                }

                setDashboardAnnouncement({ title: '', message: '' });
                addActivity(`Duyuru eklendi: ${title}`, 'settings');
                loadAnnouncementsFromSupabase();
            };

            const deleteAnnouncement = async (announcementId) => {
                const { error } = await supabaseClient
                    .from('announcements')
                    .delete()
                    .eq('id', announcementId);

                if (error) {
                    alert('Duyuru silinemedi: ' + error.message);
                    return;
                }

                setAnnouncements(prev => prev.filter(item => item.id !== announcementId));
                addActivity('Duyuru silindi', 'settings');
            };

            React.useEffect(() => {
                loadAnnouncementsFromSupabase();
                loadSystemSettingsFromSupabase();

                const channel = supabaseClient
                    .channel('admin-announcements')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'announcements' }, loadAnnouncementsFromSupabase)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'system_settings' }, loadSystemSettingsFromSupabase)
                    .subscribe();

                return () => {
                    supabaseClient.removeChannel(channel);
                };
            }, []);

            React.useEffect(() => {
                loadArtistRevenuesFromSupabase(artists);
            }, [artists]);

            const normalizeReleaseStatus = (status) => {
                if (status === 'review') return 'pending';
                if (status === 'editing') return 'action_required';
                return status || 'pending';
            };

            const releaseStatusMeta = {
                pending: {
                    label: 'İncelemede',
                    action: 'İncelemede',
                    icon: 'fa-magnifying-glass',
                    badge: 'bg-amber-500/10 text-amber-400 border-amber-500/20',
                    border: 'border-amber-500'
                },
                approved: {
                    label: 'Onaylandı',
                    action: 'Onayla',
                    icon: 'fa-check-circle',
                    badge: 'bg-green-500/10 text-green-400 border-green-500/20',
                    border: 'border-green-500'
                },
                action_required: {
                    label: 'İncelenmesi Gerekiyor',
                    action: 'İnceleme Gerekli',
                    icon: 'fa-exclamation-circle',
                    badge: 'bg-blue-500/10 text-blue-400 border-blue-500/20',
                    border: 'border-blue-500'
                },
                rejected: {
                    label: 'Reddedildi',
                    action: 'Reddet',
                    icon: 'fa-times-circle',
                    badge: 'bg-red-500/10 text-red-400 border-red-500/20',
                    border: 'border-red-500'
                }
            };

            const getReleaseStatusMeta = (status) => releaseStatusMeta[status] || releaseStatusMeta.pending;

            const getReleaseTrackCount = (release) => {
                const parsedCount = Number(release?.total_tracks);
                if (Number.isFinite(parsedCount) && parsedCount > 0) return parsedCount;
                return release?.tracks?.length || 1;
            };

            const getReleaseSortTime = (release) => {
                const dateValue = release?.createdAt || release?.submissionDate || release?.releaseDate || '';
                const parsedTime = new Date(dateValue).getTime();
                return Number.isNaN(parsedTime) ? 0 : parsedTime;
            };

            const buildCatalogSuffix = (count) => `ASTR-${String(Math.max(count, 1)).padStart(5, '0')}`;

            const enrichReleasesWithCatalogCodes = (releaseList) => {
                const sortedReleases = [...releaseList].sort((a, b) => {
                    const dateDiff = getReleaseSortTime(a) - getReleaseSortTime(b);
                    if (dateDiff !== 0) return dateDiff;
                    return String(a.id).localeCompare(String(b.id));
                });

                let songCount = 0;
                const suffixById = new Map();
                sortedReleases.forEach((release) => {
                    songCount += getReleaseTrackCount(release);
                    suffixById.set(release.id, buildCatalogSuffix(songCount));
                });

                return releaseList.map((release) => {
                    const catalogSuffix = suffixById.get(release.id) || buildCatalogSuffix(1);
                    return {
                        ...release,
                        catalog_suffix: catalogSuffix,
                        cat_code: catalogSuffix
                    };
                });
            };

            const parseJsonValue = (value, fallback) => {
                if (!value) return fallback;
                if (typeof value === 'string') {
                    try {
                        return JSON.parse(value);
                    } catch (err) {
                        return fallback;
                    }
                }
                return value;
            };

            const mapPendingRelease = (row) => {
                const tracks = parseJsonValue(row.tracks, []);
                const metadata = parseJsonValue(row.metadata, {});
                const firstTrack = Array.isArray(tracks) && tracks.length ? tracks[0] : {};
                const createdDate = row.created_at ? row.created_at.split('T')[0] : '';
                return {
                    id: row.id,
                    song: row.song_name || firstTrack.track_name || 'İsimsiz yayın',
                    artist: row.artist_name || metadata.stage_name || '-',
                    releaseDate: row.release_date || '-',
                    submissionDate: createdDate,
                    createdAt: row.created_at || null,
                    status: normalizeReleaseStatus(row.status),
                    cover_url: row.cover_url || 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=600&h=600&fit=crop',
                    audio_url: row.audio_url || firstTrack.audio_url || '#',
                    language: row.language || metadata.release_language || firstTrack.language || '-',
                    genre: row.genre || firstTrack.main_genre || '-',
                    sub_genre: row.subgenre || firstTrack.sub_genre || '-',
                    real_name: row.real_name || metadata.real_name || '-',
                    label: row.label_name || '-',
                    album_name: row.album_name || '-',
                    cat_code: row.upc_ean || row.isrc || row.id,
                    c_p_line: row.c_p_line || metadata.p_line || '-',
                    upc_ean: row.upc_ean || '-',
                    isrc: row.isrc || '-',
                    release_package: row.release_package || metadata.release_package || '-',
                    total_tracks: row.total_tracks || metadata.total_tracks || (Array.isArray(tracks) ? tracks.length : 1),
                    mix_feat: row.mix_feat || metadata.mix_feat || '-',
                    cover_file_name: row.cover_file_name || '-',
                    cover_path: row.cover_path || '-',
                    rejection_reason: row.rejection_reason || metadata.rejection_reason || '',
                    rejected_at: row.rejected_at || null,
                    transcript: row.transcript || metadata.transcript || '',
                    lyrics: row.lyrics || row.song_lyrics || metadata.lyrics || metadata.song_lyrics || '',
                    song_lyrics: row.song_lyrics || metadata.song_lyrics || '',
                    tracks: Array.isArray(tracks) ? tracks : [],
                    metadata,
                    raw: row,
                    source: 'Supabase'
                };
            };

            const loadReleasesFromSupabase = async () => {
                setReleasesLoading(true);
                setReleasesError('');

                const { data, error } = await supabaseClient
                    .from('pending_releases')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Supabase yayın kayıtları alınamadı:', error);
                    setReleasesError(error.message);
                    setReleasesLoading(false);
                    return;
                }

                setReleases(enrichReleasesWithCatalogCodes((data || []).map(mapPendingRelease)));
                setReleasesLoading(false);
            };

            const updateReleaseStatus = async (release, newStatus, options = {}) => {
                if (!release || releaseStatusSaving) return false;
                if (release.status === newStatus && !(newStatus === 'rejected' && options.rejectionReason)) return false;

                const previousStatus = release.status;
                const patch = {
                    status: newStatus,
                    rejection_reason: newStatus === 'rejected' ? (options.rejectionReason || '').trim() : ''
                };
                if (newStatus === 'rejected') {
                    patch.rejected_at = new Date().toISOString();
                } else {
                    patch.rejected_at = null;
                }
                const updatedRelease = { ...release, ...patch };
                setReleaseStatusSaving(true);
                setReleasesError('');
                setViewingRelease(updatedRelease);
                setReleases(prev => prev.map(item => item.id === release.id ? { ...item, ...patch } : item));

                if (release.source === 'Supabase') {
                    let { error } = await supabaseClient
                        .from('pending_releases')
                        .update(patch)
                        .eq('id', release.id);

                    if (error && /schema cache|rejection_reason|rejected_at|column/i.test(error.message || '')) {
                        const metadataPatch = {
                            ...(release.metadata || {}),
                            rejection_reason: patch.rejection_reason,
                            rejected_at: patch.rejected_at
                        };
                        const fallback = await supabaseClient
                            .from('pending_releases')
                            .update({
                                status: newStatus,
                                metadata: metadataPatch
                            })
                            .eq('id', release.id);
                        error = fallback.error;
                    }

                    if (error) {
                        console.error('Release durumu güncellenemedi:', error);
                        setViewingRelease({ ...release, status: previousStatus });
                        setReleases(prev => prev.map(item => item.id === release.id ? { ...item, status: previousStatus } : item));
                        setReleasesError(error.message);
                        setReleaseStatusSaving(false);
                        return false;
                    }
                }

                addActivity(`${release.song} durumu ${getReleaseStatusMeta(newStatus).label} olarak güncellendi`, 'release');
                setReleaseStatusSaving(false);
                return true;
            };

            const openReleaseRejectModal = (release) => {
                setReleaseRejectModal(release);
                setReleaseRejectReason(release?.rejection_reason || '');
            };

            const closeReleaseRejectModal = () => {
                if (releaseStatusSaving) return;
                setReleaseRejectModal(null);
                setReleaseRejectReason('');
            };

            const submitReleaseRejection = async () => {
                const reason = releaseRejectReason.trim();
                if (!releaseRejectModal || !reason) {
                    setReleasesError('Reddetme sebebini yazmalısın.');
                    return;
                }
                const saved = await updateReleaseStatus(releaseRejectModal, 'rejected', { rejectionReason: reason });
                if (saved) {
                    setReleaseRejectModal(null);
                    setReleaseRejectReason('');
                }
            };

            const openTranscriptModal = (release, track = null) => {
                const selectedTrack = track || (release.tracks && release.tracks[0]) || null;
                setTranscriptModal({ release, track: selectedTrack });
                setTranscriptText('');
                setTranscriptError('');
            };

            const createTranscript = async (target = transcriptModal) => {
                if (!target) return;
                const audioUrl = target.track?.audio_url || target.release?.audio_url;
                const existingTranscript = buildTranscriptFromRelease(target);
                if ((!audioUrl || audioUrl === '#') && !existingTranscript) {
                    setTranscriptError('Bu kayıt için kullanılabilir ses dosyası yok.');
                    return;
                }

                setTranscriptLoading(true);
                setTranscriptError('');
                setTranscriptText('');

                try {
                    await new Promise(resolve => setTimeout(resolve, 1800));
                    const transcript = existingTranscript || buildTranscriptFromRelease(target);
                    if (!transcript) {
                        setTranscriptError('Bu yayında kayıtlı transkript veya şarkı sözü alanı bulunamadı. Tam transkript için yayın gönderiminde şarkı sözü/transkript alanı dolu olmalı.');
                        return;
                    }
                    setTranscriptText(transcript);
                } catch (err) {
                    console.error('Transkript oluşturulamadı:', err);
                    setTranscriptError('Transkript oluşturulamadı.');
                } finally {
                    setTranscriptLoading(false);
                }
            };

            const getReleaseSearchQuery = (release, fallback = '') => {
                const parts = [
                    release?.song || release?.album_name || '',
                    release?.artist || '',
                    fallback
                ].filter(Boolean);
                return parts.join(' ').replace(/\s+/g, ' ').trim() || 'music';
            };

            const getTranscriptFirstSentence = (text = '') => {
                const cleaned = String(text || '').replace(/\s+/g, ' ').trim();
                if (!cleaned) return '';
                const sentence = cleaned.match(/^.+?[.!?](\s|$)/);
                return (sentence ? sentence[0] : cleaned.split(' ').slice(0, 16).join(' ')).trim();
            };

            const getSearchUrl = (platform, query) => {
                const safeQuery = encodeURIComponent(query || 'music');
                if (platform === 'spotify') return `https://open.spotify.com/search/${safeQuery}`;
                if (platform === 'youtube') return `https://www.youtube.com/results?search_query=${safeQuery}`;
                if (platform === 'apple') return `https://music.apple.com/tr/search?term=${safeQuery}`;
                return `https://www.shazam.com/search/${safeQuery}`;
            };

            const buildTranscriptFromRelease = (target) => {
                const release = target?.release || {};
                const track = target?.track || {};
                const cleanText = (value) => {
                    const text = String(value || '').trim();
                    if (!text || text === '-' || text.toLowerCase() === 'null') return '';
                    return text;
                };
                const selectedTrackText = [
                    track.transcript,
                    track.lyrics,
                    track.song_lyrics,
                    track.words,
                    track.description,
                    track.note
                ].map(cleanText).find(Boolean);

                if (selectedTrackText) return selectedTrackText;

                const allTrackTexts = Array.isArray(release.tracks)
                    ? release.tracks
                        .map((item, index) => {
                            const text = [
                                item.transcript,
                                item.lyrics,
                                item.song_lyrics,
                                item.words,
                                item.description,
                                item.note
                            ].map(cleanText).find(Boolean);
                            return text ? `Track ${item.track_number || index + 1} - ${item.track_name || release.song || 'Parça'}\n${text}` : '';
                        })
                        .filter(Boolean)
                    : [];

                if (allTrackTexts.length) return allTrackTexts.join('\n\n');

                return [
                    release.transcript,
                    release.lyrics,
                    release.song_lyrics,
                    release.words,
                    release.metadata?.lyrics,
                    release.metadata?.song_lyrics,
                    release.metadata?.transcript
                ].map(cleanText).find(Boolean) || '';
            };

            const getBeatMatches = (release, customQuery = '') => {
                const query = customQuery.trim() || getReleaseSearchQuery(release);
                return [
                    { platform: 'YouTube', title: `${query} benzer beat araması`, url: getSearchUrl('youtube', `${query} beat`), icon: 'fab fa-youtube' },

                }

                const triggerDownload = (href) => {
                    const link = document.createElement('a');
                    link.href = href;
                    link.download = fileName;
                    link.rel = 'noopener';
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                };

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Dosya alınamadı.');
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    triggerDownload(blobUrl);
                    setTimeout(() => URL.revokeObjectURL(blobUrl), 1500);
                } catch (error) {
                    triggerDownload(url);
                }
            };

            const saveAssignmentToSupabase = async ({ targetType, targetId, title, description }, adminName, noteText) => {
                if (!adminName || !targetType || targetId === undefined || targetId === null) return false;
                const assignedAdmin = getAdminByAssignmentValue(adminName);
                if (!assignedAdmin) return false;

                setAssignmentsError('');
                const assignmentPayload = {
                    target_type: targetType,
                    target_id: String(targetId),
                    assigned_to: assignedAdmin.userId,
                    assigned_by: currentAdmin?.user_id || null,
                    title,
                    description,
                    status: 'active'
                };
                if (noteText !== undefined) {
                    assignmentPayload.note = noteText.trim();
                    assignmentPayload.note_updated_at = new Date().toISOString();
                    assignmentPayload.note_created_by = currentAdmin?.user_id || null;
                }

                const { data: existingAssignment, error: findError } = await supabaseClient
                    .from('admin_assignments')
                    .select('id, assigned_to, assignment_history')
                    .eq('target_type', targetType)
                    .eq('target_id', String(targetId))
                    .eq('status', 'active')
                    .maybeSingle();

                if (findError) {
                    console.error('Atama kontrol edilemedi:', findError);
                    setAssignmentsError(findError.message);
                    return false;
                }

                const currentHistory = Array.isArray(existingAssignment?.assignment_history)
                    ? existingAssignment.assignment_history
                    : [];
                const shouldAddHistory = !existingAssignment || String(existingAssignment.assigned_to || '') !== String(assignedAdmin.userId);
                if (shouldAddHistory || currentHistory.length === 0) {
                    assignmentPayload.assignment_history = [
                        ...currentHistory,
                        {
                            assigned_to: assignedAdmin.userId,
                            assigned_to_name: assignedAdmin.name,
                            assigned_by: currentAdmin?.user_id || null,
                            assigned_by_name: currentAdminName,
                            assigned_at: new Date().toISOString()
                        }
                    ];
                }

                const { error } = existingAssignment
                    ? await supabaseClient
                        .from('admin_assignments')
                        .update(assignmentPayload)
                        .eq('id', existingAssignment.id)
                    : await supabaseClient
                        .from('admin_assignments')
                        .insert(assignmentPayload);

                if (error) {
                    console.error('Admin ataması Supabase kaydı başarısız:', error);
                    setAssignmentsError(error.message);
                    return false;
                }

                loadAdminAssignments();
                return true;
            };

                })),
                ...tickets.map(ticket => ({
                    key: `ticket-${ticket.id}`,
                    clearKey: getAssignmentClearKey('ticket', ticket.id),
                    icon: 'fas fa-headset',
                    color: 'text-emerald-400',
                    typeLabel: 'Destek Ticket',
                    title: `Ticket #${ticket.id}`,
                    text: `${ticket.subject} · ${ticket.artist}`,
                    status: ticket.status,
                    currentAssignedAdmin: getCurrentAssignedAdmin('ticket', ticket.id, ticket.assignedAdmin),
                    assignedAdmin: getAssignmentHistoryLabel('ticket', ticket.id, ticket.assignedAdmin),
                    targetType: 'ticket',
                    targetId: ticket.id
                }))
            ].filter(task => isActiveAssignmentTask(task.status));
            const supabaseAssignmentNotifications = supabaseAssignments
                .filter(assignment => assignment.assigned_to === currentAdmin?.user_id && assignment.status === 'active')
                .map(assignment => {
                    const targetType = assignment.target_type;
                    const icon = targetType === 'release' ? 'fas fa-compact-disc' : targetType === 'oac' ? 'fas fa-file-invoice' : 'fas fa-headset';
                    const color = targetType === 'release' ? 'text-amber-400' : targetType === 'oac' ? 'text-blue-400' : 'text-emerald-400';
                    const historyLength = Array.isArray(assignment.assignment_history) ? assignment.assignment_history.length : 1;
                    return {
                        id: `supabase-assignment-${assignment.id}`,
                        clearKey: `${assignment.id}-${historyLength}`,
                        assignedAdmin: currentAdminName,
                        assignedEmail: currentAdmin?.email,
                        icon,
                        title: 'Yeni admin ataması',
                        text: `${assignment.title || 'Görev'} sana atandı`,
                        color,
                        targetType,
                        targetId: assignment.target_id,
                        action: () => {
                            setActivePage('assignments');
                            setAssignmentTab('mine');
                            setShowNotifications(false);
                        }
                    };
                });
            const personalAssignmentNotifications = [
                ...assignmentNotifications.filter(note => (
                    note.assignedAdmin === currentAdminName || note.assignedEmail === currentAdmin?.email
                )),
                ...supabaseAssignmentNotifications
            ].filter(note => isAssignmentTargetActive(note.targetType, note.targetId));
            const myAssignedTasks = [
                ...allAssignmentTasks.filter(task => task.currentAssignedAdmin === currentAdminName),
                ...personalAssignmentNotifications
                    .filter(note => !allAssignmentTasks.some(task => task.targetType === note.targetType && task.targetId === note.targetId && task.currentAssignedAdmin === currentAdminName))
                    .map(note => ({
                        key: note.id,
                        clearKey: note.clearKey || note.id,
                        icon: note.icon,
                        color: note.color,
                        typeLabel: 'Bildirim',
                        title: note.title,
                        text: note.text,
                        assignedAdmin: note.assignedAdmin,
                        currentAssignedAdmin: note.assignedAdmin,
                        targetType: note.targetType,
                        targetId: note.targetId
                    }))
            ].filter(task => !clearedAssignmentIds.includes(task.clearKey || task.key));
            const assignmentTasksForView = assignmentTab === 'mine'
                ? myAssignedTasks
                : allAssignmentTasks;
            const notifications = [
                ...personalAssignmentNotifications,
                { id: 'ticket-summary', icon: 'fas fa-headset', title: 'Yeni destek talebi', text: `${tickets.filter(t => t.status === 'open').length} açık ticket bekliyor`, color: 'text-emerald-400', action: () => { setActivePage('tickets'); setShowNotifications(false); } },
                { id: 'release-summary', icon: 'fas fa-compact-disc', title: 'Yayın onayı', text: `${releases.filter(r => r.status === 'pending').length} yayın incelemede`, color: 'text-amber-400', action: () => { setActivePage('releases'); setShowNotifications(false); } },
                { id: 'payment-summary', icon: 'fas fa-wallet', title: 'Ödeme kontrolü', text: `${withdrawalRequests.filter(req => req.status !== 'paid' && req.status !== 'rejected').length} ödeme talebi sırada`, color: 'text-purple-400', action: () => { setActivePage('finance'); setShowNotifications(false); } }
            ]
                .filter(note => !deletedNotificationIds.includes(note.id))
                .map(note => ({
                    ...note,
                    read: readNotificationIds.includes(note.id)
                }));
            const unreadNotifications = notifications.filter(note => !note.read);

            const openNotification = (note) => {
                setReadNotificationIds(prev => prev.includes(note.id) ? prev : [...prev, note.id]);
                if (note.id?.startsWith('supabase-assignment-') || note.id?.startsWith('assignment-')) {
                    setActivePage('assignments');
                    setAssignmentTab('mine');
                    setShowNotifications(false);
                    return;
                }
                note.action && note.action();
            };

            const clearNotifications = () => {
                const ids = notifications.map(note => note.id);
                setReadNotificationIds(prev => Array.from(new Set([...prev, ...ids])));
                setDeletedNotificationIds(prev => Array.from(new Set([...prev, ...ids])));
                setShowNotifications(false);
            };
            const globalSearchResults = globalSearch.trim()
                ? [
                    ...tickets.map(t => ({ type: 'Ticket', title: t.subject, meta: t.artist, action: () => { setActivePage('tickets'); setSelectedTicket(t); } })),
                    ...releases.map(r => ({ type: 'Yayın', title: r.song, meta: r.artist, action: () => { setActivePage('releases'); setViewingRelease(r); } })),
                    ...artists.map(a => ({ type: 'Sanatçı', title: a.name, meta: a.email || a.id, action: () => setActivePage('artists') }))
                ].filter(item => `${item.title} ${item.meta}`.toLowerCase().includes(globalSearch.toLowerCase())).slice(0, 6)
                : [];

            const filteredArtists = artists.filter(artist => {
                const searchMatch = artist.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                   artist.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                   (artist.email || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                                   (artist.phone || '').toLowerCase().includes(searchTerm.toLowerCase());
                const dateMatch = !filterDate || artist.date === filterDate;
                return searchMatch && dateMatch;
            });
            const releaseArtistFallback = Array.from(new Set(releases.map(release => release.artist).filter(Boolean))).map((name, index) => ({
                id: `REL-${index + 1}`,
                name,
                stageName: name,
                email: '-',
                phone: '-',
                date: new Date().toISOString().split('T')[0],
                releases: releases.filter(release => release.artist === name).length,
                package: 'Panel',
                price: 'Kayıt'
            }));
            const paymentArtists = artists.length ? artists : releaseArtistFallback;
            const filteredPaymentArtists = paymentArtists.filter(artist => {
                const search = paymentSearchTerm.toLowerCase();
                return artist.name.toLowerCase().includes(search) ||
                    artist.id.toLowerCase().includes(search) ||
                    (artist.email || '').toLowerCase().includes(search) ||
                    (artist.stageName || '').toLowerCase().includes(search);
            });
            const filteredGiftArtists = artists.filter(artist => {
                const search = giftSearchTerm.toLowerCase();
                return artist.name.toLowerCase().includes(search) ||
                    artist.id.toLowerCase().includes(search) ||
                    (artist.email || '').toLowerCase().includes(search) ||
                    (artist.stageName || '').toLowerCase().includes(search) ||
                    (artist.package || '').toLowerCase().includes(search);
            });
            const selectedPaymentSummary = selectedPaymentArtist ? getArtistRevenueSummary(selectedPaymentArtist) : null;

            const handleNext = () => {
                if (startIndex < allData.length - 8) setStartIndex(prev => prev + 1);
            };

            const handlePrev = () => {
                if (startIndex > 0) setStartIndex(prev => prev - 1);
            };

            const mapAdminUser = (admin) => {
                const displayName = admin.full_name || admin.name || admin.email?.split('@')[0] || 'Admin';
                return {
                    name: displayName,
                    email: admin.email || '',
                    userId: admin.user_id,
                    role: admin.role || 'Admin',
                    online: true,
                    initials: getAdminInitials(displayName || admin.email || admin.role)
                };
            };

            const loadAdminTeam = async () => {
                const { data, error } = await supabaseClient
                    .from('admin_users')
                    .select('*')
                    .eq('active', true)
                    .order('email', { ascending: true });

                if (error) {
                    console.error('Admin listesi alınamadı:', error);
                    if (currentAdmin?.user_id) {
                        setAdminTeam([mapAdminUser(currentAdmin)]);
                    }
                    return;
                }

                const mappedAdmins = (data || [])
                    .filter(admin => admin.user_id)
                    .map(mapAdminUser);
                setAdminTeam(mappedAdmins.length > 0 ? mappedAdmins : (currentAdmin?.user_id ? [mapAdminUser(currentAdmin)] : []));
            };

            const checkAdminAccess = async (user) => {
                const { data, error } = await supabaseClient
                    .from('admin_users')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('active', true)
                    .maybeSingle();

                if (error) throw error;
                if (!data) throw new Error('Bu hesap admin yetkisine sahip değil.');
                return { ...data, user_id: user.id };
            };

            const handleAdminLogin = async (email, password) => {
                if (!email || !password) throw new Error('E-posta ve şifre zorunludur.');

                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw new Error('E-posta veya şifre hatalı.');

                const admin = await checkAdminAccess(data.user);
                setCurrentAdmin(admin);
                setIsLoggedIn(true);
            };

            const handleAdminLogout = async () => {
                await supabaseClient.auth.signOut();
                setCurrentAdmin(null);
                setIsLoggedIn(false);
            };

            React.useEffect(() => {
                let mounted = true;

                const restoreSession = async () => {
                    const { data } = await supabaseClient.auth.getSession();
                    const user = data.session?.user;

                    if (!user) {
                        if (mounted) setAuthChecking(false);
                        return;
                    }

                    try {
                        const admin = await checkAdminAccess(user);
                        if (mounted) {
                            setCurrentAdmin(admin);
                            setIsLoggedIn(true);
                        }
                    } catch (err) {
                        await supabaseClient.auth.signOut();
                        if (mounted) {
                            setCurrentAdmin(null);
                            setIsLoggedIn(false);
                        }
                    } finally {
                        if (mounted) setAuthChecking(false);
                    }
                };

                restoreSession();

                const { data: authListener } = supabaseClient.auth.onAuthStateChange((event) => {
                    if (event === 'SIGNED_OUT') {
                        setCurrentAdmin(null);
                        setIsLoggedIn(false);
                    }
                });

                return () => {
                    mounted = false;
                    authListener.subscription.unsubscribe();
                };
            }, []);

            React.useEffect(() => {
                if (!currentAdmin?.user_id) {
                    setAdminTeam([]);
                    return;
                }

                loadAdminTeam();
                const channel = supabaseClient
                    .channel('admin-users-team')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'admin_users' }, () => {
                        loadAdminTeam();
                    })
                    .subscribe();

                return () => {
                    supabaseClient.removeChannel(channel);
                };
            }, [currentAdmin?.user_id]);

            if (authChecking) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#030303] text-zinc-400">
                        <div className="text-center">
                            <i className="fas fa-circle-notch fa-spin text-purple-400 text-3xl mb-4"></i>
                            <div className="text-xs font-black uppercase tracking-[0.3em]">Oturum kontrol ediliyor</div>
                        </div>
                    </div>
                );
            }

            if (!isLoggedIn) return <Login onLogin={handleAdminLogin} />;

            return (
                <div className="flex min-w-0">
                    <div className="mobile-topbar">
                        <button className="mobile-menu-button" onClick={() => setMobileSidebarOpen(true)} aria-label="Menüyü aç">
                            <i className="fas fa-bars"></i>
                        </button>
                        <div className="flex items-center gap-2 font-black tracking-wider">
                            <img src="./astera.png" alt="" className="w-8 h-8 rounded-lg object-cover" />
                            ASTERA
                        </div>
                        <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center text-xs font-bold">{currentAdminInitials}</div>
                    </div>
                    {mobileSidebarOpen && <button className="mobile-sidebar-backdrop" onClick={() => setMobileSidebarOpen(false)} aria-label="Menüyü kapat"></button>}
                    <aside className={`sidebar ${mobileSidebarOpen ? 'mobile-open' : ''}`} onClick={(event) => {
                        if (event.target.closest('.nav-item')) setMobileSidebarOpen(false);
                    }}>
                        <div className="flex items-center gap-3 mb-10 pl-2">
                            <div className="w-9 h-9 rounded-xl overflow-hidden bg-zinc-950 border border-zinc-800 shadow-lg shadow-purple-500/20 shrink-0">
                                <img src="./astera.png" alt="Astera Music" className="w-full h-full object-cover" />
                            </div>
                            <div>
                                <div className="text-lg font-bold leading-none">ASTERA</div>
                                <div className="text-[9px] text-zinc-500 tracking-[0.2em] font-bold uppercase">Music</div>
                            </div>
                        </div>
                        <nav className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                            <NavSection title="Genel" />
                            <div onClick={() => { setActivePage('dashboard'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-th-large" label="Ana Sayfa" active={activePage === 'dashboard'} />
                            </div>
                            <div onClick={() => { setActivePage('analytics'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-chart-pie" label="Analytics" active={activePage === 'analytics'} />
                            </div>
                            <div onClick={() => { setActivePage('finance'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-wallet" label="Finans" active={activePage === 'finance'} />
                            </div>
                            <div onClick={() => { setActivePage('payment_updates'); setIsReleasesExpanded(false); loadArtistRevenuesFromSupabase(); }}>
                                <NavItem icon="fas fa-money-bill-transfer" label="Ödemeleri Güncelle" active={activePage === 'payment_updates'} />
                            </div>

                            <NavSection title="Müzik Yönetimi" />
                            <div>
                                <div onClick={() => {
                                    setActivePage('releases');
                                    setIsReleasesExpanded(!isReleasesExpanded);
                                    setReleaseFilterStatus('all');
                                }}>
                                    <NavItem icon="fas fa-compact-disc" label="Releases" active={activePage === 'releases' && !isReleasesExpanded} />
                                </div>
                                {isReleasesExpanded && (
                                    <div className="flex flex-col gap-0.5 mt-1 ml-8 border-l border-zinc-800/60 animate-in slide-in-from-top-1 duration-200">
                                        <div onClick={() => { setReleaseFilterStatus('approved'); setActivePage('releases'); setReleaseCurrentPage(1); }}>
                                            <NavItem icon="fas fa-check-circle" label="Onaylandı" active={activePage === 'releases' && releaseFilterStatus === 'approved'} sub />
                                        </div>
                                        <div onClick={() => { setReleaseFilterStatus('pending'); setActivePage('releases'); setReleaseCurrentPage(1); }}>
                                            <NavItem icon="fas fa-clock" label="İncelemede" active={activePage === 'releases' && releaseFilterStatus === 'pending'} sub />
                                        </div>
                                        <div onClick={() => { setReleaseFilterStatus('action_required'); setActivePage('releases'); setReleaseCurrentPage(1); }}>
                                            <NavItem icon="fas fa-edit" label="İncelenmesi Gerekiyor" active={activePage === 'releases' && releaseFilterStatus === 'action_required'} sub />
                                        </div>
                                        <div onClick={() => { setReleaseFilterStatus('rejected'); setActivePage('releases'); setReleaseCurrentPage(1); }}>
                                            <NavItem icon="fas fa-times-circle" label="Reddedilen" active={activePage === 'releases' && releaseFilterStatus === 'rejected'} sub />
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div onClick={() => { setActivePage('artists'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-user-friends" label="Sanatçılar" active={activePage === 'artists'} />
                            </div>
                            <div onClick={() => { setActivePage('package_gifts'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-gift" label="Hediye Gönder" active={activePage === 'package_gifts'} />
                            </div>
                            <div onClick={() => { setActivePage('playlists'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-headphones" label="Editorial Pitching" active={activePage === 'playlists'} />
                            </div>

                            <NavSection title="Araçlar & Destek" />
                            <div onClick={() => { setActivePage('marketing'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-bullhorn" label="Pazarlama" active={activePage === 'marketing'} />
                            </div>
                            <div onClick={() => { setActivePage('oac_requests'); setIsReleasesExpanded(false); setSelectedOAC(null); }}>
                                <NavItem icon="fas fa-file-invoice" label="OAC Talepleri" active={activePage === 'oac_requests'} />
                            </div>
                            <div onClick={() => { setActivePage('tickets'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-headset" label="Destek Talepleri" active={activePage === 'tickets'} />
                            </div>
                            <div onClick={() => { setActivePage('messages'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-comment-dots" label="Mesajlar" active={activePage === 'messages'} />
                            </div>
                            <div onClick={() => { setActivePage('assignments'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-user-check" label="Admin Atamaları" active={activePage === 'assignments'} />
                            </div>

                            <NavSection title="Sistem" />
                            <div onClick={() => { setActivePage('settings'); setIsReleasesExpanded(false); }}>
                                <NavItem icon="fas fa-sliders-h" label="Ayarlar" active={activePage === 'settings'} />
                            </div>
                        </nav>

                        <div className="mt-auto pt-6 border-t border-zinc-800/50">
                            <div
                                onClick={handleAdminLogout}
                                className="flex items-center gap-3 p-3 rounded-2xl bg-zinc-900/40 border border-zinc-800/50 group hover:border-purple-500/30 transition-all cursor-pointer"
                                title="Çıkış Yap"
                            >
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center font-bold text-sm shadow-lg">{currentAdminInitials}</div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-sm font-bold truncate">{currentAdmin?.email || 'Admin'}</p>
                                    <p className="text-[10px] text-zinc-500 font-medium truncate italic">{currentAdmin?.role || 'Admin Center'}</p>
                                </div>
                                <i className="fas fa-sign-out-alt text-zinc-600 group-hover:text-red-400 transition-colors px-2"></i>
                            </div>
                        </div>
                    </aside>

                    <main className="main-content">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-3xl font-extrabold tracking-tight">Hoş geldin, {currentAdminName}</h1>
                                <p className="text-zinc-500 text-sm mt-1">Operasyonel durum ve anlık veriler.</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="relative hidden xl:block">
                                    <div className="w-80 bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-2 flex items-center gap-3">
                                        <i className="fas fa-search text-zinc-600 text-xs"></i>
                                        <input
                                            value={globalSearch}
                                            onChange={(e) => setGlobalSearch(e.target.value)}
                                            placeholder="Sanatçı, ticket veya yayın ara..."
                                            className="bg-transparent outline-none text-sm text-zinc-300 placeholder:text-zinc-700 w-full"
                                        />
                                    </div>
                                    {globalSearchResults.length > 0 && (
                                        <div className="absolute right-0 top-12 w-80 bg-zinc-950 border border-purple-500/25 rounded-2xl shadow-2xl shadow-black/50 overflow-hidden z-[120]">
                                            {globalSearchResults.map((result, i) => (
                                                <button
                                                    key={i}
                                                    onClick={() => { result.action(); setGlobalSearch(''); }}
                                                    className="w-full text-left px-4 py-3 border-b border-zinc-900 last:border-0 hover:bg-purple-500/10 transition-all"
                                                >
                                                    <div className="text-[10px] font-black text-purple-400 uppercase tracking-widest">{result.type}</div>
                                                    <div className="text-sm font-bold text-zinc-100 truncate">{result.title}</div>
                                                    <div className="text-xs text-zinc-500 truncate">{result.meta}</div>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-xl text-sm text-zinc-400">
                                    <i className="far fa-calendar-alt mr-2"></i> {todayDisplay}
                                </div>
                                <div className="relative">
                                    <button
                                        onClick={() => setShowNotifications(!showNotifications)}
                                        className="w-11 h-11 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white hover:border-purple-500/40 transition-colors relative"
                                    >
                                        <i className="far fa-bell"></i>
                                        {unreadNotifications.length > 0 && (
                                            <span className="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-purple-600 text-[10px] font-black flex items-center justify-center text-white">{unreadNotifications.length}</span>
                                        )}
                                    </button>
                                    {showNotifications && (
                                        <div className="absolute right-0 top-14 w-80 bg-zinc-950 border border-purple-500/25 rounded-2xl shadow-2xl shadow-black/50 overflow-hidden z-[120]">
                                            <div className="p-4 border-b border-zinc-800 flex items-center justify-between gap-3">
                                                <div>
                                                    <div className="text-sm font-black text-white">Bildirim Merkezi</div>
                                                    <div className="text-[10px] text-zinc-500 mt-1">{unreadNotifications.length} okunmamış bildirim</div>
                                                </div>
                                                {notifications.length > 0 && (
                                                    <button
                                                        onClick={clearNotifications}
                                                        className="px-3 py-1.5 rounded-lg bg-zinc-900 border border-zinc-800 text-[10px] font-black text-zinc-400 hover:text-white hover:border-purple-500/40 transition-all"
                                                    >
                                                        Bildirimleri sil
                                                    </button>
                                                )}
                                            </div>
                                            {notifications.length === 0 && (
                                                <div className="p-5 text-xs text-zinc-600">Bildirim yok.</div>
                                            )}
                                            {notifications.map(note => (
                                                <button
                                                    key={note.id}
                                                    onClick={() => openNotification(note)}
                                                    className={`w-full text-left p-4 border-b border-zinc-900 last:border-0 flex gap-3 hover:bg-purple-500/10 transition-all ${note.read ? 'opacity-45' : ''}`}
                                                >
                                                    <div className={`w-9 h-9 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center ${note.color}`}>
                                                        <i className={note.icon}></i>
                                                    </div>
                                                    <div className="min-w-0 flex-1">
                                                        <div className="flex items-center gap-2">
                                                            {!note.read && <span className="w-2 h-2 rounded-full bg-purple-500 shrink-0"></span>}
                                                            <div className="text-sm font-bold text-zinc-100 truncate">{note.title}</div>
                                                        </div>
                                                        <div className="text-xs text-zinc-500 mt-1">{note.text}</div>
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="w-11 h-11 rounded-full bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center font-bold border-2 border-zinc-800 shadow-xl">{currentAdminInitials}</div>
                            </div>
                        </header>

                        {activePage === 'dashboard' && (
                            <React.Fragment>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                                    <StatCard title="TOPLAM STREAM" value="2.537.842" change="+18.6%" color="#8b5cf6" iconColor="text-purple-500" />
                                    <StatCard title="TOPLAM GELİR" value="₺265.430" change="+22.4%" color="#22c55e" iconColor="text-green-500" />
                                    <StatCard title="AKTİF SANATÇI" value={artists.length.toString()} change={`${artists.length > 0 ? '+'+artists.length : '0'}`} color="#f59e0b" iconColor="text-orange-500" />
                                    <StatCard title="YENİ RELEASE" value="4" change="+100%" color="#ec4899" iconColor="text-pink-500" />
                                </div>

                                                    >
                                                        <i className={`fas ${giftSaving ? 'fa-circle-notch fa-spin' : 'fa-gift'} mr-2`}></i>
                                                        {giftSaving ? 'Paket Ekleniyor...' : 'Paket Hediye Et'}
                                                    </button>
                                                </div>
                                            </div>

                                </div>

                                        <div className="max-w-6xl bg-zinc-900/40 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl">

                                                        <p className="text-xs text-zinc-200 leading-relaxed">{editorialApprovalMessage}</p>
                                                    </div>
