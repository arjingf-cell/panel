<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid Music - Admin Center</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js?v=admin-20260617" onerror="this.onerror=null;this.src='https://unpkg.com/react@18/umd/react.development.js'"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js?v=admin-20260617" onerror="this.onerror=null;this.src='https://unpkg.com/react-dom@18/umd/react-dom.development.js'"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js?v=admin-20260617" onerror="this.onerror=null;this.src='https://unpkg.com/@babel/standalone/babel.min.js'"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="this.onerror=null;this.src='https://unpkg.com/@supabase/supabase-js@2'"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 1. CANLI VE DERİN MOR ARKA PLAN */
        body {
            background: radial-gradient(circle at 0% 0%, #2e0b4e 0%, #050505 60%),
                radial-gradient(circle at 100% 100%, #1a0533 0%, #050505 60%);
            background-color: #050505;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            margin: 0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* 2. NEON SIDEBAR */
        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            padding: 24px;
            z-index: 10;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(139, 92, 246, 0.3);
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: #71717a;
            border-radius: 12px;
            margin-bottom: 4px;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item.active {
            background: rgba(139, 92, 246, 0.1);
            color: #a78bfa;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.1);
        }

        /* 3. NEON KARTLAR VE PANELLER */
        .stat-card,
        .xl\:col-span-2 {
            background: rgba(15, 15, 15, 0.6) !important;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(139, 92, 246, 0.2) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(139, 92, 246, 0.05);
            border-radius: 20px;
        }

        .chart-svg {
            width: 100%;
            height: 40px;
            /* Boyutu biraz küçülterek sadece alt şeritte kalmasını sağladım */
            position: absolute;
            bottom: 0;
            left: 0;
            opacity: 0.5;
            pointer-events: none;
            /* Altındaki butonlara tıklanmasını engellemez */
            z-index: 1;
        }

        .op-card {
            background: rgba(13, 13, 13, 0.5);
            border: 1px solid rgba(139, 92, 246, 0.1);
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .op-card:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            transform: translateY(-2px);
        }

        .logo-glow {
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.6);
            border-radius: 12px;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .pulse-red {
            animation: pulse 2s infinite;
        }

        .main-content {
            margin-left: 280px;
            padding: 40px;
            width: calc(100% - 280px);
        }

        /* Chat Custom Scrollbar */
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .chat-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Kullanici paneli ile uyumlu Astera koyu tema */
        :root {
            --astera-bg: #050507;
            --astera-sidebar-top: #0b0b11;
            --astera-sidebar-bottom: #09090d;
            --astera-card-top: #111118;
            --astera-card-bottom: #0c0c12;
            --astera-panel: #171722;
            --astera-border: rgba(255, 255, 255, 0.06);
            --astera-border-strong: rgba(180, 76, 255, 0.22);
            --astera-purple: #7b2fff;
            --astera-purple-soft: #9d4edd;
            --astera-magenta: #b84dff;
            --astera-green: #1db954;
            --astera-muted: #8f8fa3;
        }

        html,
        body {
            background: var(--astera-bg) !important;
            color: #ffffff;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background:
                radial-gradient(circle at 18% 0%, rgba(123, 47, 255, 0.14), transparent 34%),
                radial-gradient(circle at 88% 10%, rgba(184, 77, 255, 0.10), transparent 30%),
                linear-gradient(180deg, #050507 0%, #07070b 100%);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(180, 76, 255, 0.22);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(180, 76, 255, 0.58);
        }

        .sidebar {
            background: linear-gradient(180deg, var(--astera-sidebar-top), var(--astera-sidebar-bottom)) !important;
            border-right: 1px solid var(--astera-border) !important;
            box-shadow: 18px 0 55px rgba(0, 0, 0, 0.32);
        }

        .nav-item {
            color: #cfcfe7;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: #171722;
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.06);
        }

        .nav-item.active {
            background: linear-gradient(90deg, #662dff, #9d4edd) !important;
            color: #ffffff !important;
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 24px rgba(145, 70, 255, 0.34) !important;
        }

        .main-content {
            background: transparent !important;
        }

        .stat-card,
        .op-card,
        main [class*="bg-zinc-900"],
        main [class*="bg-zinc-950"],
        main [class*="bg-black"],
        main [class*="bg-[#030303]"],
        main [class*="bg-[#050505]"] {
            background: linear-gradient(180deg, var(--astera-card-top), var(--astera-card-bottom)) !important;
            border-color: var(--astera-border) !important;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.32);
        }

        main [class*="border-zinc"],
        main [class*="border-white"] {
            border-color: var(--astera-border) !important;
        }

        main [class*="text-zinc-500"],
        main [class*="text-zinc-400"],
        main [class*="text-zinc-600"] {
            color: var(--astera-muted) !important;
        }

        main [class*="text-purple"] {
            color: var(--astera-magenta) !important;
        }

        main [class*="border-purple"] {
            border-color: var(--astera-border-strong) !important;
        }

        button[class*="bg-purple"],
        a[class*="bg-purple"],
        [role="button"][class*="bg-purple"] {
            background: linear-gradient(90deg, #7b2fff, #b84dff) !important;
            color: #ffffff !important;
            box-shadow: 0 0 20px rgba(166, 73, 255, 0.30);
        }

        tbody tr {
            background: rgba(13, 13, 20, 0.88) !important;
            color: #f4f4f7 !important;
        }

        tbody tr:hover {
            background: rgba(23, 23, 34, 0.98) !important;
        }

        tbody tr td {
            border-color: rgba(255, 255, 255, 0.055) !important;
        }

        tbody tr[class*="opacity-60"] {
            background: rgba(12, 12, 18, 0.78) !important;
            opacity: 0.72 !important;
        }

        .dashboard-action-tile {
            background: rgba(13, 13, 20, 0.88) !important;
            color: #f4f4f7 !important;
        }

        .dashboard-action-tile:hover {
            background: rgba(23, 23, 34, 0.98) !important;
        }

        input,
        select,
        textarea {
            background: #0d0d14 !important;
            border-color: rgba(180, 76, 255, 0.18) !important;
            color: #f4f4f7 !important;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(180, 76, 255, 0.62) !important;
            box-shadow: 0 0 0 3px rgba(180, 76, 255, 0.10);
        }

        table thead,
        main [class*="bg-white/"] {
            background: rgba(255, 255, 255, 0.025) !important;
        }

        .logo-glow {
            box-shadow: 0 18px 42px rgba(91, 93, 246, 0.22) !important;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        .mobile-topbar,
        .mobile-sidebar-backdrop {
            display: none;
        }

        @media (max-width: 1023px) {
            body {
                background-attachment: scroll;
            }

            .sidebar {
                width: min(86vw, 320px);
                height: 100dvh;
                padding: 18px;
                z-index: 200;
                transform: translateX(-105%);
                transition: transform .25s ease;
                box-shadow: 24px 0 70px rgba(0, 0, 0, .72);
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .mobile-sidebar-backdrop {
                display: block;
                position: fixed;
                inset: 0;
                z-index: 190;
                border: 0;
                background: rgba(0, 0, 0, .7);
                backdrop-filter: blur(4px);
            }

            .mobile-topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: fixed;
                inset: 0 0 auto 0;
                z-index: 180;
                height: 60px;
                padding: 0 16px;
                background: rgba(8, 8, 13, .9);
                border-bottom: 1px solid var(--astera-border);
                backdrop-filter: blur(18px);
            }

            .mobile-menu-button {
                width: 40px;
                height: 40px;
                border-radius: 12px;
                border: 1px solid var(--astera-border-strong);
                background: #15151e;
                color: #fff;
            }

            .main-content {
                width: 100%;
                min-width: 0;
                margin-left: 0;
                padding: 84px 20px 28px;
            }

            .main-content > header {
                flex-wrap: wrap;
                gap: 16px;
                margin-bottom: 28px;
            }

            .main-content > header > div:last-child {
                width: 100%;
                justify-content: flex-start;
                flex-wrap: wrap;
            }

            .main-content table {
                min-width: 720px;
            }

            .main-content [class*="min-h-[760px]"] {
                min-height: 520px !important;
            }

            .main-content [class*="h-[calc(100vh-48px)]"] {
                height: calc(100dvh - 24px) !important;
            }
        }

        @media (max-width: 639px) {
            .main-content {
                padding: 76px 12px 20px;
            }

            .main-content > header {
                margin-bottom: 22px;
            }

            .main-content > header h1 {
                font-size: 1.45rem !important;
                line-height: 1.25;
            }

            .main-content > header > div:last-child {
                gap: 8px;
            }

            .main-content > header > div:last-child > div:first-child,
            .main-content > header > div:last-child > div:nth-child(2) {
                display: none;
            }

            .main-content [class~="p-6"],
            .main-content [class~="p-7"],
            .main-content [class~="p-8"],
            .main-content [class~="px-6"],
            .main-content [class~="px-7"],
            .main-content [class~="px-8"] {
                padding-left: 16px !important;
                padding-right: 16px !important;
            }

            .main-content [class~="py-6"],
            .main-content [class~="py-7"],
            .main-content [class~="py-8"] {
                padding-top: 16px !important;
                padding-bottom: 16px !important;
            }

            .main-content [class*="rounded-3xl"] {
                border-radius: 18px !important;
            }

            .main-content [class*="gap-6"],
            .main-content [class*="gap-8"] {
                gap: 14px !important;
            }

            .main-content [class*="mb-10"] {
                margin-bottom: 22px !important;
            }

            .main-content button,
            .main-content input,
            .main-content select,
            .main-content textarea {
                max-width: 100%;
            }

            .main-content [class*="min-w-[280px]"],
            .main-content [class*="min-w-[300px]"],
            .main-content [class*="min-w-[320px]"] {
                min-width: 0 !important;
                width: 100%;
            }

            .main-content [class~="grid-cols-3"] {
                grid-template-columns: 1fr !important;
            }

            .main-content [class~="grid-cols-2"] > button,
            .main-content [class~="grid-cols-2"] > div {
                min-width: 0;
            }

            .main-content .fixed {
                padding: 8px !important;
            }

            .main-content .fixed > [class*="max-w-"] {
                max-width: 100% !important;
                max-height: calc(100dvh - 16px) !important;
                border-radius: 18px !important;
            }

            .main-content [class*="absolute"][class*="w-80"],
            .main-content [class*="absolute"][class*="w-96"] {
                position: fixed !important;
                left: 12px !important;
                right: 12px !important;
                top: 68px !important;
                width: auto !important;
                max-height: calc(100dvh - 82px);
                overflow-y: auto;
            }

            .main-content table {
                min-width: 660px;
                font-size: 12px;
            }

            .main-content th,
            .main-content td {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }

            .main-content [class*="min-h-[760px]"] {
                min-height: 440px !important;
            }
        }
    </style>
</head>

<body>
    <div id="root">
        <div style="min-height:100vh;display:grid;place-items:center;background:#050505;color:#a78bfa;font-family:Arial,sans-serif;text-align:center;padding:24px;">
            <div>
                <div style="font-size:28px;font-weight:900;color:#fff;margin-bottom:8px;">Admin panel yükleniyor...</div>
                <div style="font-size:13px;color:#8b8b9b;">React ve panel bileşenleri hazırlanıyor.</div>
            </div>
        </div>
    </div>

    <script>
        window.__adminAppMounted = false;
        window.__adminShouldIgnoreScriptError = function (event) {
            var message = String((event && event.message) || (event && event.reason && event.reason.message) || event || '');
            return message.includes('Cannot use import statement outside a module')
                || message.includes("Failed to execute 'appendChild' on 'Node'");
        };
        window.addEventListener('error', function (event) {
            if (window.__adminShouldIgnoreScriptError(event)) {
                event.preventDefault();
                event.stopImmediatePropagation();
                console.warn('Harici script/import uyarisi yok sayildi:', event.message || event);
                return true;
            }
        }, true);
        window.addEventListener('unhandledrejection', function (event) {
            if (window.__adminShouldIgnoreScriptError(event)) {
                event.preventDefault();
                console.warn('Harici promise/import uyarisi yok sayildi:', event.reason || event);
                return true;
            }
        });
        window.addEventListener('error', function (event) {
            if (window.__adminAppMounted || window.__adminShouldIgnoreScriptError(event)) return;
            var root = document.getElementById('root');
            if (!root) return;
            root.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:Arial,sans-serif;text-align:center;padding:24px;"><div style="max-width:680px;border:1px solid rgba(239,68,68,.35);background:rgba(127,29,29,.18);border-radius:24px;padding:28px;"><div style="font-size:24px;font-weight:900;margin-bottom:10px;">Admin panel yüklenemedi</div><div style="color:#fecaca;font-size:14px;line-height:1.6;">' + String(event.message || 'Bilinmeyen hata') + '</div><div style="color:#a1a1aa;font-size:12px;margin-top:14px;">İnternet bağlantısı/CDN erişimi veya script hatası olabilir.</div></div></div>';
        });
        window.setTimeout(function () {
            if (window.__adminAppMounted) return;
            var missing = [];
            if (!window.React) missing.push('React');
            if (!window.ReactDOM) missing.push('ReactDOM');
            if (!window.Babel) missing.push('Babel');
            if (!window.supabase) missing.push('Supabase');
            var root = document.getElementById('root');
            if (!root) return;
            if (missing.length) {
                root.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:Arial,sans-serif;text-align:center;padding:24px;"><div style="max-width:720px;border:1px solid rgba(168,85,247,.35);background:rgba(24,24,27,.88);border-radius:24px;padding:28px;"><div style="font-size:24px;font-weight:900;margin-bottom:10px;">Admin panel baslatilamadi</div><div style="color:#ddd6fe;font-size:14px;line-height:1.6;">Eksik kutuphane: ' + missing.join(', ') + '</div><div style="color:#a1a1aa;font-size:12px;margin-top:14px;">CDN erisimi engellenmis olabilir. Internet baglantisini kontrol edip sayfayi Ctrl+F5 ile yenile.</div></div></div>';
            } else {
                root.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:Arial,sans-serif;text-align:center;padding:24px;"><div style="max-width:720px;border:1px solid rgba(234,179,8,.35);background:rgba(24,24,27,.88);border-radius:24px;padding:28px;"><div style="font-size:24px;font-weight:900;margin-bottom:10px;">Admin panel kodu baslamadi</div><div style="color:#fde68a;font-size:14px;line-height:1.6;">React, ReactDOM, Babel ve Supabase yuklu gorunuyor ama panel scripti calismadi.</div><div style="color:#a1a1aa;font-size:12px;margin-top:14px;">Sayfayi Ctrl+F5 ile yenile. Devam ederse tarayici konsolundaki ilk kirmizi hatayi gonder.</div></div></div>';
            }
        }, 30000);
    </script>

    <script id="admin-app-source" type="text/plain">
        const NavItem = ({ icon, label, active = false, sub = false }) => (
            <div className={`nav-item ${active ? 'active' : ''} ${sub ? 'py-1.5 px-4 ml-1' : ''}`}>
                <i className={`${icon} ${sub ? 'text-[12px] opacity-70' : ''}`}></i>
                <span className={`${sub ? 'text-[13px]' : 'text-sm'} font-medium`}>{label}</span>
            </div>
        );

        const NavSection = ({ title }) => (
            <div className="text-[10px] font-bold text-zinc-600 uppercase tracking-[0.2em] mb-3 mt-6 ml-2">
                {title}
            </div>
        );

        const DonutChart = ({ percent, label, value, color }) => {
            const dashArray = `${percent} ${100 - percent}`;
            return (
                <div className="flex flex-col items-center bg-zinc-900/40 p-8 rounded-3xl border border-zinc-800 flex-1">
                    <div className="relative w-40 h-40 mb-6">
                        <svg className="w-full h-full -rotate-90" viewBox="0 0 36 36">
                            <circle cx="18" cy="18" r="16" fill="none" className="stroke-zinc-800" strokeWidth="3" />
                            <circle cx="18" cy="18" r="16" fill="none" stroke={color} strokeWidth="3"
                                strokeDasharray={dashArray} strokeDashoffset="25" strokeLinecap="round" />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-center">
                            <span className="text-xl font-black text-white">{value}</span>
                        </div>
                    </div>
                    <h4 className="text-xs text-zinc-500 font-bold uppercase tracking-widest">{label}</h4>
                </div>
            );
        };

        const MiniChart = ({ color }) => (
            <svg className="chart-svg" viewBox="0 0 100 30" preserveAspectRatio="none">
                <path d="M0 25 C 20 10, 40 30, 60 15 S 80 5, 100 20 L 100 30 L 0 30 Z" fill={color} fillOpacity="0.15" />
                <path d="M0 25 C 20 10, 40 30, 60 15 S 80 5, 100 20" stroke={color} strokeWidth="2" fill="none" />
            </svg>
        );

        const StatCard = ({ title, value, change, color, iconColor }) => (
            <div className="stat-card">
                <div className="flex justify-between items-start mb-4 relative z-10">
                    <div className={`w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center ${iconColor}`}>
                        <i className="fas fa-chart-line"></i>
                    </div>
                    <span className="text-xs font-bold text-green-400">{change}</span>
                </div>
                <div className="relative z-10">
                    <h3 className="text-zinc-500 text-[10px] font-bold uppercase tracking-widest mb-1">{title}</h3>
                    <p className="text-2xl font-bold">{value}</p>
                </div>
                <MiniChart color={color} />
            </div>
        );

        const OpCounter = ({ label, count, icon, colorClass, onClick }) => (
            <button
                type="button"
                onClick={onClick}
                className="op-card p-4 rounded-xl flex items-center justify-between text-left w-full hover:border-purple-500/30 hover:bg-purple-500/5 transition-all active:scale-[0.99]"
            >
                <div className="flex items-center gap-3">
                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center bg-zinc-900 ${colorClass}`}>
                        <i className={icon}></i>
                    </div>
                    <span className="text-sm font-medium text-zinc-300">{label}</span>
                </div>
                <span className="text-lg font-bold">{count}</span>
            </button>
        );

        const CopyButton = ({ value }) => {
            const [copied, setCopied] = React.useState(false);
            const copyValue = async (event) => {
                event.stopPropagation();
                const text = value === null || value === undefined || value === '' ? '-' : String(value);
                try {
                    await navigator.clipboard.writeText(text);
                } catch (err) {
                    const area = document.createElement('textarea');
                    area.value = text;
                    document.body.appendChild(area);
                    area.select();
                    document.execCommand('copy');
                    area.remove();
                }
                setCopied(true);
                setTimeout(() => setCopied(false), 1000);
            };

            return (
                <button
                    type="button"
                    onClick={copyValue}
                    className="w-8 h-8 rounded-lg bg-zinc-800 hover:bg-purple-600 text-zinc-300 hover:text-white transition-all shrink-0"
                    title="Kopyala"
                >
                    <i className={`fas ${copied ? 'fa-check' : 'fa-copy'} text-xs`}></i>
                </button>
            );
        };

        const CopyField = ({ label, value, mono = false }) => {
            const displayValue = value === null || value === undefined || value === '' ? '-' : String(value);
            return (

                }
                const baseManual = [
                    { id: 'manual-hasan-avni-altas', artistName: 'Hasan Avni Altaş', packageStatus: 'Single Paket', price: 800, source: 'manual', createdAt: '2026-06-20' },
                    { id: 'manual-korku-halil-ibrahim', artistName: 'Korku (Halil İbrahim)', packageStatus: 'Çoklu Sanatçı Paketi', price: 3000, source: 'manual', createdAt: '2026-06-20' }
                ].filter(row => !hiddenManualSales.includes(row.id));

                let manualRows = baseManual;
                try {
                    const { data } = await supabaseClient
                        .from('admin_package_sales')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (Array.isArray(data) && data.length) {
                        const remoteRows = data.map(row => ({
                            id: row.id,
                            artistName: row.artist_name || '-',
                            packageStatus: row.package_status || getPackageMeta(row.package_type).label,
                            price: Number(row.price) || 0,
                            source: row.source || 'manual',
                            createdAt: row.created_at
                        }));
                        const remoteIds = new Set(remoteRows.map(row => row.id));
                        manualRows = [...remoteRows, ...baseManual.filter(row => !remoteIds.has(row.id))];
                    }
                } catch (error) {
                    console.warn('Manuel paket satışları alınamadı:', error);
                }

                try {
                    const { data, error } = await supabaseClient
                        .from('external_artist_revenues')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (error) throw error;
                    setExternalRevenues((data || []).map(row => ({
                        id: row.id,
                        artistName: row.stage_name || row.artist_email || '-',
                        artistEmail: row.artist_email || '',
                        songName: row.song_name || '-',
                        amount: Number(row.amount) || 0,
                        asteraPercent: Number(row.astera_percent) || 0,
                        asteraShare: Number(row.astera_share) || 0,
                        source: row.source || 'external',
                        createdAt: row.created_at
                    })));
                } catch (error) {
                    console.warn('External sanatçı gelirleri alınamadı:', error);
                    setExternalRevenues([]);
                }

                setPackageSales(manualRows);
            };

            React.useEffect(() => {
                loadAnalyticsSalesFromSupabase();
                const channel = supabaseClient
                    .channel('admin-analytics-sales')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'admin_package_sales' }, loadAnalyticsSalesFromSupabase)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'external_artist_revenues' }, loadAnalyticsSalesFromSupabase)
                    .subscribe();
                return () => supabaseClient.removeChannel(channel);
            }, [isLoggedIn]);

            const analyticsTotals = React.useMemo(() => {
                const packageSalesTotal = packageSales.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
                const externalRevenueTotal = externalRevenues.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                const asteraShareTotal = externalRevenues.reduce((sum, item) => sum + (Number(item.asteraShare) || 0), 0);
                return {
                    allRevenue: packageSalesTotal + externalRevenueTotal,
                    packageSalesTotal,
                    externalRevenueTotal,
                    asteraShareTotal,
                    payable: Math.max(externalRevenueTotal - asteraShareTotal, 0),
                    netProfit: packageSalesTotal
                };
            }, [packageSales, externalRevenues]);

            const analyticsRows = React.useMemo(() => {
                const packageRows = packageSales.map(item => ({
                    ...item,
                    rowType: 'package',
                    title: item.artistName,
                    subtitle: item.packageStatus,
                    amount: Number(item.price) || 0
                }));
                const externalRows = externalRevenues.map(item => ({
                    ...item,
                    rowType: 'external',
                    title: item.artistName,
                    subtitle: item.songName,
                    amount: Number(item.amount) || 0
                }));
                const rows = [...packageRows, ...externalRows].sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
                if (analyticsFilter === 'package') return rows.filter(row => row.rowType === 'package');
                if (analyticsFilter === 'external') return rows.filter(row => row.rowType === 'external');
                return rows;
            }, [packageSales, externalRevenues, analyticsFilter]);

            const getAnalyticsArtistKey = (email, name) => {
                const normalizedEmail = String(email || '').trim().toLowerCase();
                if (normalizedEmail && normalizedEmail !== '-') return `email:${normalizedEmail}`;
                return `name:${cleanStorageName(name || 'isimsiz')}`;
            };

            const analyticsArtistSummaries = React.useMemo(() => {
                const summaryMap = new Map();
                const resolveSummaryKey = (email, name) => {
                    const directKey = getAnalyticsArtistKey(email, name);
                    if (summaryMap.has(directKey)) return directKey;
                    const normalizedName = cleanStorageName(name || '');
                    const validEmail = email && String(email).trim() !== '-';
                    const existing = Array.from(summaryMap.values()).find(item =>
                        (validEmail && item.email && item.email !== '-' && item.email.toLowerCase() === String(email).toLowerCase()) ||
                        (normalizedName && cleanStorageName(item.artistName) === normalizedName)
                    );
                    return existing?.key || directKey;
                };
                const getOrCreate = (key, name, email) => {
                    if (!summaryMap.has(key)) {
                        summaryMap.set(key, {
                            key,
                            artistName: name || email || 'İsimsiz Sanatçı',
                            email: email || '',
                            totalEarned: 0,
                            totalPaid: 0,
                            pendingPayment: 0,
                            rejectedPayment: 0,
                            transactions: []
                        });
                    }
                    const summary = summaryMap.get(key);
                    if ((!summary.artistName || summary.artistName === 'İsimsiz Sanatçı') && name) summary.artistName = name;
                    if (!summary.email && email) summary.email = email;
                    return summary;
                };

                artists.forEach(artist => {
                    const artistEmail = artist.email && artist.email !== '-' ? artist.email : '';
                    const key = resolveSummaryKey(artistEmail, artist.stageName || artist.name);
                    getOrCreate(key, artist.stageName || artist.name, artistEmail);
                });

                externalRevenues.forEach(revenue => {
                    const key = resolveSummaryKey(revenue.artistEmail, revenue.artistName);
                    const summary = getOrCreate(key, revenue.artistName, revenue.artistEmail);
                    const payableAmount = Math.max((Number(revenue.amount) || 0) - (Number(revenue.asteraShare) || 0), 0);
                    summary.totalEarned += payableAmount;
                    summary.transactions.push({
                        id: `revenue-${revenue.id}`,
                        type: 'revenue',
                        title: revenue.songName || 'Şarkı geliri',
                        description: `${revenue.source || 'external'} · Brüt ${formatMoney(revenue.amount || 0)} · Astera ${formatMoney(revenue.asteraShare || 0)}`,
                        amount: payableAmount,
                        status: 'earned',
                        date: revenue.createdAt
                    });
                });

                withdrawalRequests.forEach(request => {
                    const key = resolveSummaryKey(request.email, request.artist_name);
                    const summary = getOrCreate(key, request.artist_name, request.email);
                    const amount = Number(request.amount) || 0;
                    if (request.status === 'paid') summary.totalPaid += amount;
                    else if (request.status === 'rejected') summary.rejectedPayment += amount;
                    else summary.pendingPayment += amount;
                    summary.transactions.push({
                        id: `withdrawal-${request.id}`,
                        type: 'withdrawal',
                        title: request.status === 'paid' ? 'Ödenmiş çekim' : request.status === 'rejected' ? 'Reddedilen çekim' : 'Bekleyen ödeme talebi',
                        description: [request.bank_name, request.iban_account_holder, request.iban].filter(Boolean).join(' · ') || 'Banka bilgisi yok',
                        amount,
                        status: request.status || 'pending',
                        date: request.paid_at || request.requested_at || request.created_at,
                        payoutDate: request.payout_date || null
                    });
                });

                return Array.from(summaryMap.values())
                    .map(summary => ({
                        ...summary,
                        availableBalance: Math.max(summary.totalEarned - summary.totalPaid - summary.pendingPayment, 0),
                        transactions: summary.transactions.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0))
                    }))
                    .sort((a, b) => b.totalEarned - a.totalEarned || a.artistName.localeCompare(b.artistName, 'tr'));
            }, [artists, externalRevenues, withdrawalRequests]);

            const selectedAnalyticsArtist = React.useMemo(
                () => analyticsArtistSummaries.find(artist => artist.key === selectedAnalyticsArtistKey) || null,
                [analyticsArtistSummaries, selectedAnalyticsArtistKey]
            );

            const filteredAnalyticsArtistSummaries = React.useMemo(() => {
                const search = analyticsArtistSearch.trim();
                if (search.length < 3) return analyticsArtistSummaries;
                const normalizedSearch = cleanStorageName(search);
                return analyticsArtistSummaries.filter(artist =>
                    cleanStorageName(artist.artistName).includes(normalizedSearch) ||
                    cleanStorageName(artist.email).includes(normalizedSearch)
                );
            }, [analyticsArtistSummaries, analyticsArtistSearch]);

            const addPackageSale = async () => {
                const artistName = packageSaleForm.artistName.trim();
                const price = Number(packageSaleForm.price) || 0;
                if (!artistName || price <= 0) {
                    alert('İsim ve fiyat alanını doldur.');
                    return;
                }

                const packageType = getPackageTypeFromLabel(packageSaleForm.packageStatus);
                const payload = {
                    artist_name: artistName,
                    package_type: packageType,
                    package_status: packageSaleForm.packageStatus,
                    price,
                    source: 'manual'
                };

                setAnalyticsSaving(true);
                try {
                    const { error } = await supabaseClient.from('admin_package_sales').insert(payload);
                    if (error) throw error;
                    setPackageSaleForm({ artistName: '', packageStatus: 'Single Paket', price: '' });
                    await loadAnalyticsSalesFromSupabase();
                } catch (error) {
                    const localSale = {
                        id: `manual-${Date.now()}`,
                        artistName,
                        packageStatus: packageSaleForm.packageStatus,
                        price,
                        source: 'local',
                        createdAt: new Date().toISOString()
                    };
                    setPackageSales(prev => [localSale, ...prev]);
                    alert('Supabase kaydı yapılamadı, satış lokale eklendi: ' + (error?.message || error));
                } finally {
                    setAnalyticsSaving(false);
                }
            };

            const addExternalArtistRevenue = async () => {
                const artistName = externalRevenueForm.artistName.trim();
                const songName = externalRevenueForm.songName.trim();
                const amount = Number(externalRevenueForm.amount) || 0;
                const asteraPercent = Math.min(Math.max(Number(externalRevenueForm.asteraPercent) || 0, 0), 100);
                if (!artistName || !songName || amount <= 0) {
                    alert('Sanatçı adı, şarkı adı ve gelir alanını doldur.');
                    return;
                }

                const matchedArtist = selectedExternalArtist;
                if (!matchedArtist || !matchedArtist.email || matchedArtist.email === '-') {
                    alert('Sanatçı listesinden bir sanatçı seçmelisin. En az 3 karakter yazıp çıkan listeden seçim yap.');
                    return;
                }
                const month = new Date().toISOString().slice(0, 7);
                const payload = {
                    artist_id: Number(matchedArtist?.rawId || matchedArtist?.raw?.id) || null,
                    artist_email: matchedArtist?.email && matchedArtist.email !== '-' ? matchedArtist.email : '',
                    stage_name: matchedArtist?.stageName || artistName,
                    song_name: songName,
                    source: 'external',
                    month,
                    amount,
                    astera_percent: asteraPercent,
                    astera_share: amount * (asteraPercent / 100),
                    paid: 0,
                    spotify_share: 0,
                    apple_share: 0,
                    youtube_share: 0,
                    updated_at: new Date().toISOString()
                };

                setAnalyticsSaving(true);
                try {
                    const { error } = await supabaseClient.rpc('add_external_artist_revenue', {
                        p_artist_id: payload.artist_id,
                        p_artist_email: payload.artist_email,
                        p_stage_name: payload.stage_name,
                        p_song_name: payload.song_name,
                        p_month: payload.month,
                        p_amount: payload.amount,
                        p_astera_percent: payload.astera_percent
                    });
                    if (error) throw error;
                    setExternalRevenueForm({ artistName: '', songName: '', amount: '', asteraPercent: '' });
                    setSelectedExternalArtist(null);
                    await loadAnalyticsSalesFromSupabase();
                    alert('Sanatçı geliri kullanıcı paneline eklendi.');
                } catch (error) {
                    const { astera_percent, astera_share, ...artistRevenuePayload } = payload;
                    const fallbackError = await saveArtistRevenueFallback(artistRevenuePayload);
                    if (fallbackError) {
                        alert('Sanatçı geliri eklenemedi: ' + (fallbackError?.message || error?.message || error));
                    } else {
                        setExternalRevenues(prev => [{
                            id: `local-external-${Date.now()}`,
                            artistName: payload.stage_name,
                            songName: payload.song_name,
                            amount: payload.amount,
                            asteraPercent: payload.astera_percent,
                            asteraShare: payload.astera_share,
                            source: 'local',
                            createdAt: new Date().toISOString()
                        }, ...prev]);
                        setExternalRevenueForm({ artistName: '', songName: '', amount: '', asteraPercent: '' });
                        setSelectedExternalArtist(null);
                        alert('Sanatçı geliri kullanıcı paneline eklendi.');
                    }
                } finally {
                    setAnalyticsSaving(false);
                }
            };

            const saveArtistRevenueFallback = async (payload) => {
                const artistId = Number(payload.artist_id) || null;
                let query = supabaseClient
                    .from('artist_revenues')
                    .select('id, amount')
                    .eq('month', payload.month)
                    .limit(1);

                if (artistId) {
                    query = query.eq('artist_id', artistId);
                } else {
                    query = query.eq('artist_email', payload.artist_email || '');
                }

                const { data: existingRows, error: selectError } = await query;
                if (selectError) return selectError;

                const existing = existingRows?.[0];
                if (existing?.id) {
                    const { error: updateError } = await supabaseClient
                        .from('artist_revenues')
                        .update({
                            amount: (Number(existing.amount) || 0) + (Number(payload.amount) || 0),
                            stage_name: payload.stage_name,
                            song_name: payload.song_name,
                            source: payload.source,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', existing.id);
                    return updateError || null;
                }

                const { error: insertError } = await supabaseClient
                    .from('artist_revenues')
                    .insert(payload);
                return insertError || null;
            };

            const deleteAnalyticsRow = async (row) => {
                if (!row) return;
                if (!confirm(`${row.title || row.artistName} kaydını silmek istiyor musun?`)) return;

                if (row.rowType === 'package') {
                    if (String(row.id).startsWith('manual-') || row.source === 'local') {
                        if (String(row.id).startsWith('manual-')) {
                            let hiddenManualSales = [];
                            try {
                                hiddenManualSales = JSON.parse(localStorage.getItem('astera_hidden_manual_analytics_sales') || '[]');
                            } catch (error) {
                                hiddenManualSales = [];
                            }
                            localStorage.setItem('astera_hidden_manual_analytics_sales', JSON.stringify([...new Set([...hiddenManualSales, row.id])]));
                        }
                        setPackageSales(prev => prev.filter(item => item.id !== row.id));
                        return;
                    }

                    const { error } = await supabaseClient
                        .from('admin_package_sales')
                        .delete()
                        .eq('id', row.id);

                    if (error) {
                        alert('Paket satışı silinemedi: ' + error.message);
                        return;
                    }
                    await loadAnalyticsSalesFromSupabase();
                    return;
                }

                if (String(row.id).startsWith('local-external-') || row.source === 'local') {
                    setExternalRevenues(prev => prev.filter(item => item.id !== row.id));
                    return;
                }

                const { error } = await supabaseClient.rpc('delete_external_artist_revenue', {
                    p_revenue_id: row.id
                });

                if (error) {
                    alert('Şarkı geliri silinemedi: ' + error.message);
                    return;
                }

                await loadAnalyticsSalesFromSupabase();
            };

            const formatDateTime = (value) => {
                if (!value) return '-';
                const date = new Date(value);
                if (Number.isNaN(date.getTime())) return value;
                return date.toLocaleDateString('tr-TR', { day: '2-digit', month: 'long', year: 'numeric' });
            };

            const getPackageRemainingLabel = (artist) => {
                if (!artist?.packageExpiresAt) return artist?.packageType === 'single' ? '1 yayın hakkı' : '-';
                const expires = new Date(artist.packageExpiresAt);
                if (Number.isNaN(expires.getTime())) return '-';
                const days = Math.ceil((expires.getTime() - Date.now()) / 86400000);
                return days > 0 ? `${days} gün kaldı` : 'Süresi doldu';
            };

            const getPackageRemainingDays = (artist) => {
                if (!artist?.packageExpiresAt) return null;
                const expires = new Date(artist.packageExpiresAt);
                if (Number.isNaN(expires.getTime())) return null;
                return Math.max(Math.ceil((expires.getTime() - Date.now()) / 86400000), 0);
            };

            const getArtistRevenueKey = (artist) => {
                const identity = artist?.email && artist.email !== '-'
                    ? artist.email
                    : artist?.stageName && artist.stageName !== '-'
                        ? artist.stageName
                        : artist?.name || 'guest';
                return `astera_artist_revenue_${cleanStorageName(identity)}`;
            };

            const getEmptyArtistRevenue = (artist) => ({
                artistKey: cleanStorageName(artist?.email || artist?.stageName || artist?.name || 'guest'),
                artistName: artist?.name || '',
                artistEmail: artist?.email || '',
                stageName: artist?.stageName || '',
                months: [],
                platformShares: { spotify: 0, apple: 0, youtube: 0 },
                updatedAt: null
            });

            const readSingleArtistRevenue = (artist) => {
                try {
                    const parsed = JSON.parse(localStorage.getItem(getArtistRevenueKey(artist)) || 'null');
                    return parsed
                        ? { ...getEmptyArtistRevenue(artist), ...parsed, months: Array.isArray(parsed.months) ? parsed.months : [], platformShares: { spotify: 0, apple: 0, youtube: 0, ...(parsed.platformShares || {}) } }
                        : getEmptyArtistRevenue(artist);
                } catch (error) {
                    return getEmptyArtistRevenue(artist);
                }
            };

            const readRevenueMapFromStorage = (artistList = artists) => {
                const sourceArtists = artistList.length ? artistList : artists;
                const nextMap = {};
                sourceArtists.forEach(artist => {
                    nextMap[artist.id] = readSingleArtistRevenue(artist);
                });
                setArtistRevenueData(nextMap);
                return nextMap;
            };

            const loadArtistRevenuesFromSupabase = async (artistList = artists) => {
                const { data, error } = await supabaseClient
                    .from('artist_revenues')
                    .select('*')
                    .order('month', { ascending: true });

                if (error) {
                    console.error('Sanatçı gelirleri alınamadı:', error);
                    return readRevenueMapFromStorage(artistList);
                }

                const sourceArtists = artistList.length ? artistList : artists;
                const nextMap = {};
                sourceArtists.forEach(artist => {
                    const artistId = Number(artist.rawId || artist.raw?.id);
                    const rows = (data || []).filter(row =>
                        (artistId && Number(row.artist_id) === artistId) ||
                        (artist.email && artist.email !== '-' && row.artist_email === artist.email)
                    );
                    const latest = rows[rows.length - 1] || {};
                    nextMap[artist.id] = {
                        ...getEmptyArtistRevenue(artist),
                        months: rows.map(row => ({
                            month: row.month,
                            amount: Number(row.amount) || 0,
                            paid: Number(row.paid) || 0
                        })),
                        platformShares: {
                            spotify: Number(latest.spotify_share) || 0,
                            apple: Number(latest.apple_share) || 0,
                            youtube: Number(latest.youtube_share) || 0
                        },
                        updatedAt: latest.updated_at || null
                    };
                });
                setArtistRevenueData(nextMap);
                return nextMap;
            };

            const getArtistRevenueSummary = (artist) => {
                const data = artistRevenueData[artist?.id] || readSingleArtistRevenue(artist);
                const months = [...(data.months || [])].sort((a, b) => String(a.month).localeCompare(String(b.month)));
                const total = months.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                const paid = months.reduce((sum, item) => sum + (Number(item.paid) || 0), 0);
                const latest = months[months.length - 1] || null;
                return { data, months, total, paid, pending: Math.max(total - paid, 0), latest };
            };

            const openPaymentArtist = (artist) => {
                const revenueMap = artistRevenueData;
                const data = revenueMap[artist.id] || readSingleArtistRevenue(artist);
                const months = [...(data.months || [])].sort((a, b) => String(a.month).localeCompare(String(b.month)));
                const latest = months[months.length - 1];
                setSelectedPaymentArtist(artist);
                setPaymentForm({
                    month: latest?.month || new Date().toISOString().slice(0, 7),
                    amount: latest?.amount ? String(latest.amount) : '',
                    paid: latest?.paid ? String(latest.paid) : '',
                    spotify: Number(data.platformShares?.spotify) || 0,
                    apple: Number(data.platformShares?.apple) || 0,
                    youtube: Number(data.platformShares?.youtube) || 0
                });
            };

            const savePaymentUpdate = async () => {
                if (!selectedPaymentArtist) return;
                const artistId = Number(selectedPaymentArtist.rawId || selectedPaymentArtist.raw?.id);

                if (!artistId) {
                    alert('Bu sanatçının Supabase artist ID bilgisi yok. Önce Supabase sanatçı listesinden kayıt seçin.');
                    return;
                }

                const month = paymentForm.month || new Date().toISOString().slice(0, 7);
                const payload = {
                    artist_id: artistId,
                    artist_email: selectedPaymentArtist.email || '',
                    stage_name: selectedPaymentArtist.stageName || selectedPaymentArtist.name || '',
                    month,
                    amount: Number(paymentForm.amount) || 0,
                    paid: Number(paymentForm.paid) || 0,
                    spotify_share: Number(paymentForm.spotify) || 0,
                    apple_share: Number(paymentForm.apple) || 0,
                    youtube_share: Number(paymentForm.youtube) || 0,
                    updated_at: new Date().toISOString()
                };

                const { error } = await supabaseClient
                    .from('artist_revenues')
                    .upsert(payload, { onConflict: 'artist_id,month' });

                if (error) {
                    alert('Gelir kaydedilemedi: ' + error.message);
                    return;
                }

                const data = artistRevenueData[selectedPaymentArtist.id] || getEmptyArtistRevenue(selectedPaymentArtist);
                const months = [...(data.months || [])].filter(item => item.month !== month);
                months.push({ month, amount: payload.amount, paid: payload.paid });
                const nextData = {
                    ...getEmptyArtistRevenue(selectedPaymentArtist),
                    ...data,
                    months: months.sort((a, b) => String(a.month).localeCompare(String(b.month))),
                    platformShares: {
                        spotify: payload.spotify_share,
                        apple: payload.apple_share,
                        youtube: payload.youtube_share
                    },
                    updatedAt: new Date().toISOString()
                };
                localStorage.setItem(getArtistRevenueKey(selectedPaymentArtist), JSON.stringify(nextData));
                setArtistRevenueData(prev => ({ ...prev, [selectedPaymentArtist.id]: nextData }));
                await loadArtistRevenuesFromSupabase();
                setActivityLog(prev => [{ id: Date.now(), actor: selectedPaymentArtist.name, action: `${formatPaymentMonth(month)} geliri güncellendi`, time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }), type: 'finance' }, ...prev]);
                alert('Gelir güncellendi.');
            };

            const loadGiftHistory = async (artist) => {
                const artistId = Number(artist?.rawId || artist?.raw?.id);
                if (!artistId) {
                    setGiftHistory([]);
                    return;
                }

                setGiftHistoryLoading(true);
                const [giftResult, orderResult, entitlementResult] = await Promise.all([
                    supabaseClient
                        .from('admin_package_gifts')
                        .select('*')
                        .eq('artist_id', artistId)
                        .order('created_at', { ascending: false }),
                    supabaseClient
                        .from('shopier_payment_orders')
                        .select('*')
                        .eq('artist_id', artistId)
                        .eq('status', 'paid')
                        .order('created_at', { ascending: false }),
                    supabaseClient
                        .from('release_entitlements')
                        .select('*')
                        .eq('artist_id', artistId)
                        .order('created_at', { ascending: false })
                ]);

                if (giftResult.error) console.error('Hediye geçmişi alınamadı:', giftResult.error);
                if (orderResult.error) console.error('Satın alım geçmişi alınamadı:', orderResult.error);
                if (entitlementResult.error) console.error('Hak geçmişi alınamadı:', entitlementResult.error);

                const gifts = (giftResult.data || []).map(item => ({ ...item, historyType: 'gift' }));
                const orders = (orderResult.data || []).map(item => ({ ...item, historyType: 'purchase' }));
                const entitlements = (entitlementResult.data || []).map(item => ({ ...item, historyType: 'entitlement' }));
                const merged = [...gifts, ...orders, ...entitlements]
                    .sort((a, b) => new Date(b.created_at || b.paid_at || 0) - new Date(a.created_at || a.paid_at || 0));

                setGiftHistory(merged);
                setGiftHistoryLoading(false);

            const openGiftArtist = (artist) => {
                setSelectedGiftArtist(artist);
                setGiftForm({
                    packageType: artist?.packageType && artist.packageType !== 'new' ? artist.packageType : 'single',
                    days: 365,
                    note: ''
                });
                loadGiftHistory(artist);

            const saveGiftPackage = async () => {
                if (!selectedGiftArtist) return;
                const artistId = Number(selectedGiftArtist.rawId || selectedGiftArtist.raw?.id);

                if (!artistId) {
                    alert('Bu sanatçının Supabase artist ID bilgisi yok.');
                    return;
                }

                setGiftSaving(true);
                const giftDays = Math.max(1, Number(giftForm.days) || 365);
                const { data, error } = await supabaseClient.rpc('gift_artist_package_days', {
                    p_artist_id: artistId,
                    p_package_type: giftForm.packageType,
                    p_note: giftForm.note || null,
                    p_days: giftDays
                });
                setGiftSaving(false);

                if (error) {
                    alert('Paket hediye edilemedi: ' + error.message);
                    return;
                }

                const meta = getPackageMeta(giftForm.packageType);
                const nextExpiresAt = data?.expires_at || selectedGiftArtist.packageExpiresAt;
                const nextStartedAt = data?.starts_at || selectedGiftArtist.packageStartedAt || new Date().toISOString();
                setSelectedGiftArtist(prev => prev ? {
                    ...prev,
                    packageType: giftForm.packageType,
                    package: meta.shortLabel,
                    packageStartedAt: nextStartedAt,
                    packageExpiresAt: nextExpiresAt,
                    paymentStatus: 'paid',
                    accountStatus: 'active',

                    price: giftForm.packageType === 'single' ? '1 hak' : getPackageRemainingLabel({ packageType: giftForm.packageType, packageExpiresAt: nextExpiresAt })
                } : prev);
                addActivity(`${selectedGiftArtist.name} için ${meta.label} hediye edildi (${giftForm.packageType === 'single' ? '1 hak' : `${giftDays} gün`})`, 'finance');
                alert(`${meta.label} başarıyla hediye edildi${giftForm.packageType === 'single' ? '.' : `: ${giftDays} gün.`}`);
                await loadArtistsFromSupabase();
                await loadGiftHistory(selectedGiftArtist);
            };

            const loadArtistsFromSupabase = async () => {
                setArtistsLoading(true);
                setArtistsError('');

                const [artistResult, entitlementResult] = await Promise.all([
                    supabaseClient
                        .from('artists')
                        .select('*')
                        .order('created_at', { ascending: false }),
                    supabaseClient
                        .from('release_entitlements')
                        .select('artist_id, package_type, label_plan, starts_at, expires_at, status, unlimited, created_at')
                        .order('created_at', { ascending: false })
                ]);

                const { data, error } = artistResult;

                if (error) {
                    console.error('Supabase sanatçı kayıtları alınamadı:', error);
                    setArtistsError(error.message);
                    setArtists([]);
                    setArtistsLoading(false);
                    return;
                }

                if (entitlementResult.error) {
                    console.error('Paket hakları alınamadı:', entitlementResult.error);
                }

                const entitlementByArtistId = new Map();
                (entitlementResult.data || []).forEach(entitlement => {
                    const artistId = String(entitlement.artist_id || '');
                    if (!artistId) return;

                    const current = entitlementByArtistId.get(artistId);
                    const entitlementExpiry = entitlement.expires_at ? new Date(entitlement.expires_at).getTime() : 0;
                    const currentExpiry = current?.expires_at ? new Date(current.expires_at).getTime() : 0;
                    const isActive = entitlement.status === 'active';
                    const currentIsActive = current?.status === 'active';

                    if (!current || (isActive && !currentIsActive) || (isActive === currentIsActive && entitlementExpiry > currentExpiry)) {
                        entitlementByArtistId.set(artistId, entitlement);
                    }
                });

                const mappedArtists = (data || []).map((row) => {
                    const entitlement = entitlementByArtistId.get(String(row.id)) || null;
                    const createdDate = row.created_at ? row.created_at.split('T')[0] : new Date().toISOString().split('T')[0];
                    const accountType = row.hesap_turu || row.account_type || row.type || 'Sanatçı';
                    const labelValue = row.label_adi || row.label_name || row.label || '-';
                    const nameValue = row.ad_soyad || row.full_name || row.name || labelValue || 'İsimsiz Kayıt';
                    const stageNameValue = row.stage_name || row.sahne_adi || nameValue;
                    const phoneValue = row.telefon || row.phone || row.phone_number || row.ulke_kodu || row.country_code || '-';
                    const countryCode = row.ulke_kodu || row.country_code || '-';
                    const termsApproved = Boolean(row.sartlar_onay ?? row.terms_approved ?? row.terms_accept);
                    const artistExpiryTime = row.package_expires_at ? new Date(row.package_expires_at).getTime() : 0;
                    const entitlementExpiryTime = entitlement?.expires_at ? new Date(entitlement.expires_at).getTime() : 0;
                    const useEntitlementDates = entitlementExpiryTime > artistExpiryTime;
                    const packageType = (useEntitlementDates ? entitlement?.package_type : row.package_type) || row.package_type || entitlement?.package_type || 'new';
                    const packageStartedAt = (useEntitlementDates ? entitlement?.starts_at : row.package_started_at) || row.package_started_at || entitlement?.starts_at || null;
                    const packageExpiresAt = (useEntitlementDates ? entitlement?.expires_at : row.package_expires_at) || row.package_expires_at || entitlement?.expires_at || null;
                    const activePackage = getPackageMeta(packageType);
                    return {
                        raw: row,
                        rawId: row.id,
                        userId: row.user_id || null,
                        id: `AST-${row.id}`,
                        name: nameValue,
                        stageName: stageNameValue,
                        email: row.email || '-',
                        phone: phoneValue,
                        date: createdDate,
                        releases: 0,
                        package: activePackage.shortLabel,
                        packageType,
                        packageStartedAt,
                        packageExpiresAt,
                        packageDateSource: packageExpiresAt ? (useEntitlementDates ? 'release_entitlements' : 'artists') : null,
                        paymentStatus: row.payment_status || 'unpaid',
                        panelStatus: row.panel_status || 'pending',
                        accountStatus: row.account_status || 'pending',
                        labelPlan: row.label_plan || entitlement?.label_plan || null,
                        price: packageType === 'single' ? '1 hak' : getPackageRemainingLabel({ packageType, packageExpiresAt }),
                        source: 'Supabase',
                        accountType,
                        labelName: labelValue,
                        countryCode,
                        termsApproved,
                        bankName: row.bank_name || row.banka_adi || '-',
                        iban: row.iban ? String(row.iban).replace(/\s+/g, '').replace(/(.{4})/g, '$1 ').trim() : '-',
                        ibanAccountHolder: row.iban_account_holder || row.hesap_sahibi || '-',
                        ibanUpdatedAt: row.iban_updated_at || null,
                        createdAt: row.created_at || null
                    };
                });

                setArtists(mappedArtists);
                setSelectedArtist(previous => previous
                    ? mappedArtists.find(artist => artist.id === previous.id) || previous
                    : previous
                );
                setSelectedGiftArtist(previous => previous
                    ? mappedArtists.find(artist => artist.id === previous.id) || previous
                    : previous
                );
                setArtistsLoading(false);
                await loadArtistRevenuesFromSupabase(mappedArtists);
            };

            React.useEffect(() => {
                loadArtistsFromSupabase();

            const loadAnnouncementsFromSupabase = async () => {

                if (error) {

                setAnnouncements(data || []);

            const loadSystemSettingsFromSupabase = async () => {
                const { data, error } = await supabaseClient
                    .from('system_settings')

                    .eq('id', 'min_release_date')

                if (error) {

            const updateEarliestReleaseDate = async (value) => {

                if (value) {
                    localStorage.setItem('astera_min_release_date', value);
                } else {
                    localStorage.removeItem('astera_min_release_date');

                setEarliestReleaseSaving(true);
                const { error } = await supabaseClient
                    .from('system_settings')
                    .upsert({

                        description: 'Admin panelinden belirlenen yayın tarihi sınırı. Bu tarihten önce yayın tarihi seçilemez.',
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'id' });

                if (error) {

                    return;
                }

                addActivity(value ? `Yayın tarihi sınırı ${value} olarak ayarlandı` : 'Yayın tarihi sınırı kaldırıldı', 'settings');

            const openEarliestReleasePicker = () => {
