                        {selectedAnalyticsArtist && (
                            <div className="fixed inset-0 z-[123] flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm">
                                <div className="w-full max-w-5xl max-h-[90vh] bg-zinc-900 border border-purple-500/30 rounded-3xl shadow-2xl shadow-purple-500/10 overflow-hidden flex flex-col">
                                    <div className="px-7 py-5 border-b border-zinc-800 flex items-center justify-between gap-4">
                                        <div>
                                            <div className="text-[10px] font-black uppercase tracking-[0.25em] text-purple-300 mb-2">Sanatçı Finans Detayı</div>
                                            <h3 className="text-2xl font-black text-white">{selectedAnalyticsArtist.artistName}</h3>
                                            <p className="text-xs text-zinc-500 mt-1">{selectedAnalyticsArtist.email || 'E-posta bilgisi yok'}</p>
                                        </div>
                                        <button onClick={() => setSelectedAnalyticsArtistKey(null)} className="w-10 h-10 rounded-xl bg-zinc-950 border border-zinc-800 text-zinc-500 hover:text-white transition">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>

                                    <div className="p-6 grid grid-cols-2 lg:grid-cols-4 gap-4 border-b border-zinc-800">
                                        {[
                                            ['Toplam Bakiye', selectedAnalyticsArtist.totalEarned, 'text-emerald-300'],
                                            ['Toplam Ödenen', selectedAnalyticsArtist.totalPaid, 'text-blue-300'],
                                            ['Ödenmesi Beklenen', selectedAnalyticsArtist.pendingPayment, 'text-amber-300'],
                                            ['Kullanılabilir Bakiye', selectedAnalyticsArtist.availableBalance, 'text-purple-300']
                                        ].map(([label, amount, color]) => (
                                            <div key={label} className="bg-black/35 border border-zinc-800 rounded-2xl p-5">
                                                <div className="text-[9px] font-black uppercase tracking-widest text-zinc-600">{label}</div>
                                                <div className={`text-xl font-black mt-2 ${color}`}>{formatMoney(amount)}</div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="overflow-y-auto chat-scroll">
                                        <table className="w-full text-left">
                                            <thead className="sticky top-0 bg-zinc-950 text-[10px] uppercase tracking-widest text-zinc-500 z-10">
                                                <tr>
                                                    <th className="px-6 py-4">Tarih</th>
                                                    <th className="px-6 py-4">İşlem</th>
                                                    <th className="px-6 py-4">Detay</th>
                                                    <th className="px-6 py-4">Durum</th>
                                                    <th className="px-6 py-4 text-right">Tutar</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-zinc-800/60">
                                                {selectedAnalyticsArtist.transactions.map(transaction => {
                                                    const isRevenue = transaction.type === 'revenue';
                                                    const statusMeta = transaction.status === 'paid'
                                                        ? ['Ödendi', 'bg-blue-500/10 text-blue-300 border-blue-500/20']
                                                        : transaction.status === 'rejected'
                                                            ? ['Reddedildi', 'bg-red-500/10 text-red-300 border-red-500/20']
                                                            : isRevenue
                                                                ? ['Kazanç', 'bg-emerald-500/10 text-emerald-300 border-emerald-500/20']
                                                                : ['Bekliyor', 'bg-amber-500/10 text-amber-300 border-amber-500/20'];
                                                    return (
                                                        <tr key={transaction.id} className="hover:bg-white/[0.02]">
                                                            <td className="px-6 py-4 text-xs text-zinc-500 whitespace-nowrap">{formatDateTime(transaction.date)}</td>
                                                            <td className="px-6 py-4 text-sm font-black text-white">{transaction.title}</td>
                                                            <td className="px-6 py-4 text-xs text-zinc-500 max-w-sm">{transaction.description}</td>
                                                            <td className="px-6 py-4">
                                                                <span className={`inline-flex px-2.5 py-1 rounded-lg border text-[9px] font-black uppercase ${statusMeta[1]}`}>{statusMeta[0]}</span>
                                                            </td>
                                                            <td className={`px-6 py-4 text-right text-sm font-black ${isRevenue ? 'text-emerald-300' : 'text-blue-300'}`}>
                                                                {isRevenue ? '+' : '-'}{formatMoney(transaction.amount)}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                        {selectedAnalyticsRow && (
                            <div className="fixed inset-0 z-[122] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                                <div className={`w-full max-w-2xl rounded-3xl border shadow-2xl overflow-hidden ${selectedAnalyticsRow.rowType === 'external' ? 'bg-zinc-900 border-emerald-500/30 shadow-emerald-500/10' : 'bg-zinc-900 border-purple-500/30 shadow-purple-500/10'}`}>
                                    <div className="px-7 py-5 border-b border-zinc-800 flex items-center justify-between gap-4">
                                        <div>
                                            <div className={`text-[10px] font-black uppercase tracking-[0.25em] mb-2 ${selectedAnalyticsRow.rowType === 'external' ? 'text-emerald-300' : 'text-purple-300'}`}>
                                                {selectedAnalyticsRow.rowType === 'external' ? 'Şarkı Geliri Detayı' : 'Paket Satışı Detayı'}
                                            </div>
                                            <h3 className="text-xl font-black text-white">{selectedAnalyticsRow.title}</h3>
                                            <p className="text-xs text-zinc-500 mt-1">{selectedAnalyticsRow.createdAt ? formatDateTime(selectedAnalyticsRow.createdAt) : '-'}</p>
                                        </div>
                                        <button onClick={() => setSelectedAnalyticsRow(null)} className="w-9 h-9 rounded-xl bg-zinc-950 border border-zinc-800 text-zinc-500 hover:text-white transition">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>
                                    <div className="p-7 grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {[
                                            ['Sanatçı', selectedAnalyticsRow.title],
                                            [selectedAnalyticsRow.rowType === 'external' ? 'Şarkı' : 'Paket Durumu', selectedAnalyticsRow.subtitle],
                                            ['Kaynak', selectedAnalyticsRow.source || '-'],
                                            ['Toplam Tutar', formatMoney(selectedAnalyticsRow.amount || 0)],
                                            ['Astera Payı', selectedAnalyticsRow.rowType === 'external' ? `${selectedAnalyticsRow.asteraPercent || 0}% · ${formatMoney(selectedAnalyticsRow.asteraShare || 0)}` : '-'],
                                            ['Sanatçıya Ödenecek', selectedAnalyticsRow.rowType === 'external' ? formatMoney(Math.max((Number(selectedAnalyticsRow.amount) || 0) - (Number(selectedAnalyticsRow.asteraShare) || 0), 0)) : formatMoney(0)]
                                        ].map(([label, value]) => (
                                            <div key={label} className="bg-black/35 border border-zinc-800 rounded-2xl p-5">
                                                <div className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-2">{label}</div>
                                                <div className="text-sm font-black text-zinc-100 break-words">{value}</div>
                                            </div>
                                        ))}
                                        {selectedAnalyticsRow.rowType === 'external' && (
                                            <div className="md:col-span-2 rounded-2xl border border-blue-500/20 bg-blue-500/10 p-5">
                                                <div className="text-[10px] font-black uppercase tracking-widest text-blue-300 mb-2">Ödeme Özeti</div>
                                                <p className="text-sm text-zinc-200 leading-relaxed">
                                                    Bu kayıtta {formatMoney(selectedAnalyticsRow.amount || 0)} şarkı geliri var. Astera Yapı payı {formatMoney(selectedAnalyticsRow.asteraShare || 0)} olarak ayrıldı; sanatçıya ödenecek tutar {formatMoney(Math.max((Number(selectedAnalyticsRow.amount) || 0) - (Number(selectedAnalyticsRow.asteraShare) || 0), 0))}.
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                        {transcriptLoading && (
                            <div className="fixed inset-0 z-[130] flex items-center justify-center p-4 bg-black/85 backdrop-blur-md">
                                <div className="w-full max-w-lg bg-zinc-900 border border-purple-500/30 rounded-3xl p-8 shadow-2xl shadow-purple-500/20 text-center">
                                    <div className="w-16 h-16 mx-auto rounded-3xl bg-purple-500/15 border border-purple-500/30 text-purple-200 flex items-center justify-center text-2xl mb-5">
                                        <i className="fas fa-wave-square fa-beat"></i>
                                    </div>
                                    <h3 className="text-2xl font-black text-white mb-2">Transkript çıkarılıyor</h3>
                                    <p className="text-sm text-zinc-400 mb-6">Ses dosyası analiz ediliyor, sonuç birazdan ekrana gelecek.</p>
                                    <div className="h-3 rounded-full bg-zinc-950 border border-zinc-800 overflow-hidden">
                                        <div className="h-full w-2/3 bg-gradient-to-r from-purple-600 via-fuchsia-500 to-purple-400 rounded-full animate-pulse"></div>
                                    </div>
                                </div>
                            </div>
                        )}
                        {transcriptText && transcriptModal && !transcriptLoading && (
                            <div className="fixed inset-0 z-[125] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                                <div className="w-full max-w-3xl bg-zinc-900 border border-purple-500/30 rounded-3xl shadow-2xl shadow-purple-500/10 overflow-hidden">
                                    <div className="px-7 py-5 border-b border-zinc-800 flex items-center justify-between gap-4">
                                        <div>
                                            <h3 className="text-lg font-black text-white">Transkript Hazır</h3>
                                            <p className="text-xs text-zinc-500 mt-1">{transcriptModal.release?.song || 'Yayın'} için oluşturuldu.</p>
                                        </div>
                                        <button onClick={() => { setTranscriptText(''); setTranscriptModal(null); }} className="w-9 h-9 rounded-xl bg-zinc-950 border border-zinc-800 text-zinc-500 hover:text-white hover:border-purple-500/50 transition">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>
                                    <div className="p-7">
                                        <div className="bg-black/35 border border-zinc-800 rounded-2xl p-5 max-h-[45vh] overflow-auto">
                                            <p className="text-sm text-zinc-200 leading-relaxed whitespace-pre-wrap">{transcriptText}</p>
                                        </div>
                                        <div className="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            <a href={getSearchUrl('youtube', getTranscriptFirstSentence(transcriptText))} target="_blank" className="bg-red-600 hover:bg-red-500 text-white py-3 rounded-2xl font-black text-sm flex items-center justify-center gap-3 transition-all">
                                                <i className="fab fa-youtube"></i>
                                                İlk Cümleyi YouTube'da Aç
                                            </a>
                                            <a href={getSearchUrl('spotify', getTranscriptFirstSentence(transcriptText))} target="_blank" className="bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-2xl font-black text-sm flex items-center justify-center gap-3 transition-all">
                                                <i className="fab fa-spotify"></i>
                                                İlk Cümleyi Spotify'da Aç
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        {beatMatchesModal && (
                            <div className="fixed inset-0 z-[125] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                                <div className="w-full max-w-2xl bg-zinc-900 border border-blue-500/30 rounded-3xl shadow-2xl shadow-blue-500/10 overflow-hidden">
                                    <div className="px-7 py-5 border-b border-zinc-800 flex items-center justify-between gap-4">
                                        <div>
                                            <h3 className="text-lg font-black text-white">Beat Detector Linkleri</h3>
                                            <p className="text-xs text-zinc-500 mt-1">Arama: {beatMatchesModal.query || beatMatchesModal.release?.song || 'Yayın'}</p>
                                        </div>
                                        <button onClick={() => setBeatMatchesModal(null)} className="w-9 h-9 rounded-xl bg-zinc-950 border border-zinc-800 text-zinc-500 hover:text-white hover:border-blue-500/50 transition">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>
                                    <div className="p-7 space-y-3">
                                        {(beatMatchesModal.matches || []).map((match) => (
                                            <a key={`${match.platform}-${match.url}`} href={match.url} target="_blank" className="flex items-center justify-between gap-4 bg-black/35 border border-zinc-800 hover:border-blue-500/50 rounded-2xl p-4 transition-all">
                                                <span className="flex items-center gap-3 min-w-0">
                                                    <span className="w-11 h-11 rounded-2xl bg-blue-500/10 border border-blue-500/20 text-blue-300 flex items-center justify-center shrink-0">
                                                        <i className={match.icon}></i>
                                                    </span>
                                                    <span className="min-w-0">
                                                        <span className="block text-sm font-black text-white">{match.platform}</span>
                                                        <span className="block text-xs text-zinc-500 truncate">{match.title}</span>
                                                    </span>
                                                </span>
                                                <i className="fas fa-arrow-up-right-from-square text-zinc-500"></i>
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        {coverPreviewUrl && (
                            <div className="fixed inset-0 z-[125] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
                                <div className="w-full max-w-2xl">
                                    <div className="flex justify-end gap-3 mb-4">
                                        <button onClick={() => downloadAsset(coverPreviewUrl, 'kapak_gorseli.jpg')} className="px-5 py-3 rounded-2xl bg-purple-600 hover:bg-purple-500 text-white text-xs font-black flex items-center gap-2 transition">
                                            <i className="fas fa-download"></i>
                                            Resmi İndir
                                        </button>
                                        <button onClick={() => setCoverPreviewUrl('')} className="w-11 h-11 rounded-2xl bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white transition">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>
                                    <img src={coverPreviewUrl} alt="Kapak önizleme" className="w-full max-h-[78vh] object-contain rounded-3xl border border-zinc-800 bg-black shadow-2xl shadow-black" />
                                </div>
                            </div>
                        )}
                        {releaseRejectModal && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                                <div className="bg-zinc-900 border border-red-500/30 rounded-3xl w-full max-w-xl shadow-2xl shadow-red-500/10 animate-in zoom-in duration-200 overflow-hidden">
                                    <div className="px-7 py-5 border-b border-zinc-800 flex items-center justify-between">
                                        <div>
                                            <h3 className="text-lg font-black text-white">Yayını Reddet</h3>
                                            <p className="text-xs text-zinc-500 mt-1">{releaseRejectModal.song} için kullanıcıya gönderilecek sebebi yaz.</p>
                                        </div>
                                        <button onClick={closeReleaseRejectModal} className="w-9 h-9 rounded-xl bg-zinc-950 border border-zinc-800 text-zinc-500 hover:text-white hover:border-red-500/40 transition">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>
                                    <div className="p-7">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-2 block">Reddedilme sebebi nedir?</label>
                                        <textarea
                                            value={releaseRejectReason}
                                            onChange={(e) => setReleaseRejectReason(e.target.value)}
                                            placeholder="Örn: Kapak görseli platform kurallarına uygun değil. Lütfen yazıları kaldırıp tekrar gönderin."
                                            className="w-full min-h-[150px] resize-none bg-black border border-zinc-800 rounded-2xl px-4 py-3 text-sm text-zinc-200 outline-none focus:border-red-500/60 placeholder:text-zinc-700"
                                        ></textarea>
                                        <div className="mt-5 flex items-center justify-end gap-3">
                                            <button onClick={closeReleaseRejectModal} className="px-5 py-3 rounded-xl bg-zinc-950 border border-zinc-800 text-zinc-400 hover:text-white text-xs font-black transition">İptal</button>
                                            <button
                                                onClick={submitReleaseRejection}
                                                disabled={releaseStatusSaving || !releaseRejectReason.trim()}
                                                className="px-5 py-3 rounded-xl bg-red-600 hover:bg-red-500 disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed text-white text-xs font-black transition flex items-center gap-2"
                                            >
                                                <i className={`fas ${releaseStatusSaving ? 'fa-spinner fa-spin' : 'fa-paper-plane'}`}></i>
                                                Gönder
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        window.__adminAppMounted = true;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        (function bootAdminPanel() {
            function showBootError(title, detail) {
                window.__adminAppMounted = true;
                var root = document.getElementById('root');
                if (!root) return;
                root.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:Arial,sans-serif;text-align:center;padding:24px;"><div style="max-width:860px;border:1px solid rgba(239,68,68,.35);background:rgba(24,24,27,.92);border-radius:24px;padding:28px;text-align:left;"><div style="font-size:24px;font-weight:900;margin-bottom:10px;text-align:center;">' + title + '</div><pre style="white-space:pre-wrap;word-break:break-word;color:#fecaca;font-size:12px;line-height:1.55;background:#09090b;border:1px solid rgba(239,68,68,.2);border-radius:16px;padding:16px;max-height:55vh;overflow:auto;">' + String(detail || 'Bilinmeyen hata').replace(/[&<>]/g, function (ch) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[ch]; }) + '</pre></div></div>';
            }

            function runWhenReady() {
                var missing = [];
                if (!window.React) missing.push('React');
                if (!window.ReactDOM) missing.push('ReactDOM');
                if (!window.Babel) missing.push('Babel');
                if (!window.supabase) missing.push('Supabase');

                if (missing.length) {
                    setTimeout(runWhenReady, 250);
                    return;
                }

                try {
                    var sourceEl = document.getElementById('admin-app-source');
                    if (!sourceEl) throw new Error('admin-app-source bulunamadi.');
                    var compiled = Babel.transform(sourceEl.textContent, {
                        presets: [['react', { runtime: 'classic' }]],
                        filename: 'adminindex.jsx'
                    }).code;
                    (0, eval)(compiled);
                } catch (err) {
                    console.error('Admin panel boot hatasi:', err);
                    showBootError('Admin panel kodu calisamadi', err && (err.stack || err.message) ? (err.stack || err.message) : err);
                }
            }

            runWhenReady();
        })();
    </script>
</body>

</html>
